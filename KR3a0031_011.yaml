body:
  text: 二程外書卷十一宋朱子編時氏本拾遺或問老子言天地不仁聖人不仁如何曰謂天地不仁以萬物為芻狗是也謂聖人不仁以百姓為芻狗非也聖人豈有不仁所患者不仁也天地何意於仁鼓舞萬物而不與聖人同憂聖人則仁此其為能𢎞道也或問記曰康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而後嫁者也先生曰今母保養赤子其始何嘗學來當保養之時自然中所欲若推此心保民設不中其所欲亦不逺因說昔楊軾為宣州簽判一日差王某為杖直當日晚有同姓名者來陳狀乞分産軾疑其杖直便決朁了赤子不能言尚能中其欲民能言却不知其情大抵只是少察學者今日無可添唯有可減減盡便無事大學舉而不能先命也命當作怠字之誤也窮理盡性至命一事也才窮理便盡性盡性便至命因指柱曰此木可以為柱理也其曲直者性也其所以曲直者命也理性命一而已或問忠恕之别曰猶形影也無忠則不能為恕矣尹子曰伊川先生嘗言中庸乃孔門傳授心法郭忠孝議易傳序曰易即道也又何從道或以問伊川伊川曰人隨時變易為何為從道也范文甫問四象子曰左右前後楊中立問四象子言四方雋不疑說春秋則非處事應機則不異於古人董仲舒論事先引春秋論事則是引春秋則非王道與儒道同皆通貫天地學純則純王純儒也或問劉蕡曰浚恆之凶始求深也曰然則宜如何曰尺蠖之屈以求伸也疏逺小臣一旦欲以新間舊難矣或問貞觀之治不幾三代之盛乎曰關雎麟趾之意安在德至於無我者雖善言美行無非所過之化也教人者養其善心而惡自消治民者導之敬讓而爭自息天地之化一息不留疑其速也然寒暑之變甚漸世之人務窮天地萬物之理不知反之一身五臟六腑毛髮筋骨之所存鮮或知之善學者取諸身而已自一身以觀天地李朴字先之請教先生曰當養浩然之氣又問曰觀張子厚所作西銘能養浩然之氣者也子謂尹焞魯張繹俊俊恐他日過之魯者終有守也尹子張子見先生曰二子於某言如何尹子對曰聞先生之言言下領意焞不如繹能終守先生之學繹亦不如焞先生欣然曰各中其病王信伯問學於伊川曰願聞一言先生曰勿信吾言但信取理先生過成都坐於所館之堂讀易有造桶者前視之指未濟卦問先生曰何也曰三陽皆失位先生異之問其姓與居則失之矣易傳曰聞之成都隱者酉室所聞云田夫釋耒者誤朝廷議授游定夫以正言蘇右丞沮止毁及伊川宰相蘇子容曰公未可如此頌觀過其門者無不肅也朱公掞以諌官召過洛見伊川顯道在坐公掞不語伊川指顯道謂之曰此人為切問近思之學張思叔請問其論或大高伊川不答良久曰纍高必自下尹子問范淳夫之為人子曰其人如玉有死而復蘇者故禮三日而斂然趙簡子七日猶蘇雖蛆食其舌鼻猶不害唯伏地甚者遂致并腹腫背冷故未三日而斂皆有殺之之理知德斯知言故言使不動孟子知武王故不信漂杵之說學者要先會疑邵堯夫詩曰梧桐月向懷中照楊栁風來面上吹明道曰真風流人豪伊川曰邵堯夫在急流中被渠安然取十年快樂石曼卿詩云樂意相關禽對語生香不斷樹交花明道曰此語形容得浩然之氣龜山語録潘千之云張師雍曽問伊川云昔明道嘗與學者論浩然之氣因舉古詩云云如何伊川沈吟看師雍曰好或問孝天之經何也曰本乎天者親上輕清者是也本乎地者親下重濁者是也天地之常莫不反本人之孝亦反本之謂也元經天子之史也書帝正月非也章氏之子與明道之子王氏壻也明道子死章納其婦先生曰豈有生為親友死取其婦者他日王氏來餽送一皆謝遣章來欲見其子先生曰母子無絶道然君乃其父之罪人也范堯夫經筵坐睡先生語人曰堯夫胸中無事如此有朝士入朝倒執手板先生曰此人胸中不是無事陳經正問曰据貴一所見盈天地間皆我之性更不復知我身之為我伊川笑曰他人食飽公無餒乎不能克已則為楊氏為我不能復禮則為墨氏兼愛故曰親親而仁民仁民而愛物此之謂也或問涵養曰若造得到更說甚涵養易無妄曰天下雷行物與無妄動以天理故也其大略如此又須研究之則自有得處三代忠質文其因時之尚然也夏近古人多忠誠故為忠忠弊故救之以質質弊故救之以文非道有弊也後世不守故浸而成弊雖不可以一二事觀之大槩可知如堯舜禹之相繼其文章氣象亦自小異也心定者其言重以舒不定者其言輕以疾立宗必有奪宗法如卑幼為大臣以今之法自合立廟不可使從宗子以祭楊子曰觀乎天地則見聖人伊川曰不然觀乎聖人則見天地朱公掞為御史端笏正立嚴毅不可犯班列肅然蘇子瞻語人曰何時打破這敬字尹子曰馮理自號東臯居士曰二十年聞先生教誨今有一竒特事先生曰何如理曰夜間宴坐室中有光先生曰頤亦有竒特事理請聞之先生曰每食必飽崇寧初范致虛言程頤以邪說詖行惑亂衆聽尹焞張繹為之羽翼遂下河南府體究學者往别因言世故先生曰三代之治不可復也有賢君作能致小康則有之尹子曰邵堯夫家以墓志屬明道許之太中伊川不欲因步月於庭明道曰皓已得堯夫墓志矣堯夫之學可謂安且成太中乃許吕與叔作橫渠行狀有見二程盡棄其學之語尹子言之先生曰表叔平生議論謂頤兄弟有同處則可若謂學於頤兄弟則無是事頃年屬與叔刪去不謂尚存斯言幾於無忌憚按行狀今有兩本一本云盡棄其學而學焉一本云於是盡棄異學淳如也恐是後來所改酉室所聞云聖人氣數順無橫逆死學入聖域其數亦隨氣幹轉先生曰學而至聖為奪造化者以此又問聰明如何磨去曰使之則有不使則亡一作無崇寧間言者范致虛攻先生為元祐邪說朝廷下河南府盡逐學徒後數月馬伸時舉及門求見先生辭之伸欲先棄官而來先生曰近日盡逐學徒恐非公仕進所利公能棄官則官不必棄也建炎間伸為御史論事公論與之范淳夫之女讀孟子出入無時莫知其鄉惟心之謂與語人曰孟子不識心心豈有出入先生聞之曰此女雖不識孟子却能識心後嫁耿氏而卒或謂孔子尊周孟子欲齊王行王政何也先生曰譬如一樹有可栽培之理則栽培之不然須别種賢聖何心視天命之改與未改爾有患心疾見物皆獅子伊川教之以見即直前捕執之無物也久之疑疾遂愈或問世傳有人化虎理有之乎曰有之昔在涪見村民爪甲漸變如虎毛班班然通身夜開關延虎食其牢中之豕化雖未成而氣類相感其情已通矣溫公薨朝廷命伊川先生主其喪事是日也祀明堂禮成而二蘇往哭溫公道遇朱公掞問之公掞曰往哭溫公而程先生以為慶弔不同日二蘇悵然而反曰鏖糟陂裏叔孫通也言其山野自是時時謔伊川他日國忌禱於相國寺伊川令供素饌子瞻詰之曰正叔不好佛胡為食素正叔曰禮居喪不飲酒食肉忌日喪之餘也子瞻令具肉食曰為劉氏者左袒於是范淳夫輩食素秦黃輩食肉吕申公為相凡事有疑必質於伊川進退人才二蘇疑伊川有力故極口詆之云伊川主溫公喪事子瞻周視無闕禮乃曰正叔喪禮何其熟也又曰軾聞居喪未葬讀喪禮太中康寧何為讀喪禮乎伊川不答鄒至完聞之曰伊川之母先亡獨不可以治喪禮乎范淳夫嘗與伊川論唐事及為唐鑑盡用先生之論先生謂門人曰淳夫乃能相信如此或謂科舉事業奪人之功是不然且一月之中以十日為舉業餘日足可為學然人不志此必志於彼故科舉之事不患妨功惟患奪志或謂漢史天子建中和之極學者甚病中與極之語曰此亦有禮中和猶木材也極猶屋之極有中和斯有極如有木材斯可建屋之極學者須識此氣象此一段溫州傅録程氏自先生兄弟所葬以昭穆定穴不用墓師以五色帛埋旬日視色明暗卜地氣善否官婢行酒暢大隱力拒之先生聞而不善之也暢字潜道明道先生每與門人講論有不合者則曰更有商量伊川則直曰不然謝顯道崇寧間上殿不稱㫖先生聞之喜已而就監門之職陳貴一問謝顯道如何人先生曰由求之徒或云建中間尹子曰先生謂侯師聖議論只好隔壁聽尹子曰先生年七十四得風痺疾服大承氣湯則小愈是年九月服之輒利醫者語家人曰侍講病不比常時時大觀元年九月也十六日入視先生以白夾被被體坐竹牀舉手相揖焞喜以為疾去先生曰疾去而氣復者安候也頤愈覺羸劣焞既還十七日有叩門者報先生傾殂司馬溫公辭副樞名冠一時天下無賢不肖浩然歸重吕申公亦以論新法不合罷歸熙寧末申公起知河陽明道以詩送行復為詩與溫公蓋恐其以不出為高也及申公自河陽乞在京宫祠神宗大喜召登樞府人以二公出處為優劣二先生曰吕公世臣不得不歸見上司馬分諍臣不得不退處酉室所聞云顏子得淳和之氣何故天曰衰周天地和氣有限養得仲尼已是多也聖賢以和氣生須和氣養常人之生亦藉外養也問踧踖如也與與如也曰恭而安與與容與之貌有雍容氣象乂王信伯語云問踧踖如也曰恭而安王信伯問伊川又曰與與容與之貌又問孔子言舜之韶盡善武王之武未盡善何也曰此聖人之心有所未足伊川以易傳示門人曰只說得七分後人更須自體究釋氏談道非不上下一貫觀其用處便作兩截問吕與叔云不倚之謂中先生謂近之而詞未瑩如何曰無倚著處陳經邦問詩說言唐魏已變先代之風又言先聖流風遺俗盡故次以陳兩意似不異何以分先後先生曰聖人之都風化所厚聖人之國典法所存唐魏聖人之都其風雖變而典法尚在陳舜之後聖人之國亦被夷狄之風則典法隨而亡矣三代之後有志之士欲復先王之治而不能者皆由典法不備故典法尚存有人舉而行之無難矣張思叔作商稅院題名記先生以為得體李邦直卒委思叔作祭文多溢美先生顧思叔曰商稅院題名記是公所為乎思叔唯唯他日别製祭文用之曰世推文章位登丞輔編簡見其才華廊廟存其步武范溫譏張思叔曰買取錦屛三畝地蒲輪未至且躬耕先生聞之曰於張繹有何加損也范淳夫之葬先生為之經理掘地深數丈不置一物葬之日招左近父老犒以酒食示之其後發塜者相繼而淳夫墓獨完橫渠學堂雙牖右書訂頑左書砭愚伊川曰是起爭端改之曰東銘西銘內直則其氣浩然養之則為大人孟子知言即知道也詖淫邪遁是觀人之言而知之亦可以考其書然本意唯為觀人之言也或問旱乾水溢則變置社稷社稷土地之神如何變置曰勾龍配食於社棄配食於稷諸侯之國亦各以其有功水土者為配旱乾水溢則變置所配之人曰所配者果能致力於水旱乎曰古之人作事唯實而已始以其有功水土故祀之今以其水旱故易之精一便是執中底道理或問孔子何譏大閲曰講武必於農隙魯之八月夏之六月也盛夏閲兵妨農害人其失甚矣有警而為之則無及也無事而為之則妄動也子言左傳非丘明作虞不臘矣并庶長皆秦官秦語子謂事親舍藥物可也是非君子之言二程外書卷十一
