body:
  text: 二程外書卷十二宋朱子編傳聞雜記可以死可以無死死傷勇夫人之於死也何以知可不可哉蓋視義為去就耳豫嘗曰死生之際惟義所在則義所以對死者也程伯淳聞而謂豫曰義無對御史俸薄故臺中有聚㕔向火分㕔喫飯之語熙寧初程伯淳入臺為裏行則反之遂聚㕔喫飯分㕔向火伯淳為豫言右二事見王氏麈史王得臣字彥輔程正叔先生曰樞密院乃虛設大事三省同議其他乃有司之事兵部尚書之職然藝祖用此以分宰相之權神宗改官制亦循此意治平中見正叔先生云今之守令唯制民之産一事不得為其他在法度中甚有可為者患人不為耳右二事見吕氏家孰記吕希哲字原明二程之學以聖人為必可學而至而已必欲學而至於聖人溫公薨門人或欲遺表中入規諌語程正叔云是公平生未嘗欺人可死後欺君乎右二事見吕氏發明義理同上程正叔言同姓相見當致親親之意而不可叙齒以拜蓋昭穆高下未可知也右一事見吕氏酬酢事變同上元祐二年正月二十五日戊寅內侍至資善傳㫖權罷講一日二十七日庚辰資善吏報馬宗道云上前日微傷食物曽取勤藥恐未能久坐令講讀少進說是日正叔略講畢奏云臣等前日臨赴講筵忽傳聖㫖權罷講臣等甚驚聖躬别無事否上曰别無事自初御邇英至是始發德音二月十五日戊戌正叔講一言可終身行之其恕乎因言人君當推已欲惡知小民飢寒稼穡艱難明宗年六十餘即位猶書田家詩二首於殿壁其詩云云進說甚多三月二十六日戊寅正叔獨奏乞自四月就寬涼處講讀二十八日移講讀就延和四月六日丁亥講讀依舊邇英閣顧子敦封駁以為延和執政得一賜坐啜茶已為至榮豈可使講讀小臣坐殿上違咸造勿䙝之義持國微仲進呈令修邇英閣多置軒窗已得㫖而吕公方入令修延義閣簾內云此待别有擘畫未知何所也十五日丙申邇英進講文公以下預焉邇英新修展御坐比舊近後數尺門南北皆朱漆釣窗前簾設青幕障日殊寬涼矣右范太史日記范祖禹字淳夫先生離京曽面言令光庭說與淳夫為資善堂見畜小魚恐近冬難畜託淳夫取來投之河中數次朝中不遇故因循至此專奉手啓幸便為之右朱給事與范太史帖朱庭光字公掞元符末徽宗即位皇太后垂簾聽政有㫖復哲宗元祐皇后孟氏位號時有論其不可者曰上於元祐后叔嫂也叔無復嫂之禮伊川先生謂邵伯溫曰元祐后之賢固也論者之言亦未為無理伯溫曰子甚宜其妻父母不悅出子不宜其妻父母曰是善事我子行夫婦之禮焉太后於哲廟母也於元祐后姑也母之命姑之命何為不可非上以叔復嫂也先生喜曰子之言得之矣元豐八年神宗升遐遺詔至洛程宗丞伯淳為汝州酒官以檄來舉哀府治既罷謂留守韓康公之子宗師兵部曰皓以言新法不便忤大臣同列皆謫官皓獨除監司皓不敢當念先帝見知之恩終無以報已而泣兵部問今日朝廷之事如何宗丞曰司馬君實吕晦叔作相矣兵部曰二公果作相當何如宗丞曰當與元豐大臣同若先分黨與他日可憂兵部曰何憂宗丞曰元豐大臣皆嗜利者若使自變其已甚害民之法則善矣不然衣冠之禍未艾也君實忠直難與議晦叔解事恐力不足耳既而皆驗宗丞論此時范淳夫朱公掞杜孝錫伯溫同聞之荆公置條例司用程伯淳為屬一日盛暑荆公與伯淳對語公子雱囚首跣足攜婦人冠以出問荆公曰所言何事荆公曰新法數為人沮與程君議雱箕踞以坐大言曰梟韓琦富弼之首於市則新法行矣荆公遽曰兒誤矣伯淳正色曰方與參政論國事子弟不可預姑退雱不樂去伯淳自此與荆公不合元祐初文潞公以太師平章軍國重事召程正叔為崇政殿說書正叔以師道自居侍上講色甚莊以諷諌上畏之潞公對上甚恭進士唱名侍立終日上屢曰太師少休頓首謝立不去時年九十矣或謂正叔曰君之倨視潞公之恭議者以為未盡正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傅其敢不自重吾與潞公所以不同也識者服其言伯淳先生嘗曰熙寧初王介甫行新法並用君子小人君子正直不合介甫以為俗學不通世務斥去小人苟容諂佞介甫以為有才知變通適用之君子如司馬君實不拜副樞以去范堯夫辭修注得罪張天祺以御史面折介甫被責介甫性狠愎衆人以為不可則執之愈堅君子既去所用小人爭為刻薄故害天下益深使衆君子未與之敵俟其勢久自緩委曲平章尚有聽從之理則小人無隙可乘其害不至如此之甚也伊川先生貶涪州渡漢江中流船幾覆舟中人皆號哭伊川獨正襟安坐如常已而及岸同舟有老父問曰當船危時君正坐色甚莊何也伊川曰心存誠敬耳老父曰心存誠敬固善然不若無心伊川欲與之言而老父徑去宗丞先生謂伯溫曰人之為學忌先立標準若循循不已自有所至矣老人敝廬􅈦後無門由旁舍委曲以出先人既沒伯溫鑿壁為門侍講先生見之曰先生規畫必有理不可改作伯溫亟塞之伯溫初入仕侍講曰凡所部公吏雖有罪亦當立案而後決或出於私怒比具案怒亦散不至倉卒傷人每決人未經杖責者宜慎之恐其或有立也右七事見邵氏聞見録邵伯溫字子文康節先生之子孔子曰天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何於天之將喪斯文下便言後死者不得與於斯文則是文之興喪在孔子與天為一矣蓋聖人德盛與天為一出此等語自不覺耳孟子地位未能到此故曰天未欲平治天下也如欲平治天下當今之世舍我其誰聽天所命未能合一明道云或問明道先生如何斯可謂之恕先生曰充擴得去則為恕心如何是充擴得去底氣象曰天地變化草木蕃充擴不去時如何曰天地閉賢人隱敢問何謂浩然之氣孟子曰難言也明道先生云只他道箇難言也便知這漢肚裏有爾許大事若是不理會得底便撐拄胡說將去橫渠嘗言吾十五年學箇恭而安不成明道曰可知是學不成有多少病在明道嘗曰吾學雖有所受天理二字却是自家體貼出來陜西曽有議欲罷鑄銅錢者以謂官中費一貫鑄得一貫為無利伊川曰此便是公家之利利多費省私鑄者衆費多利薄盜鑄者息盜鑄者息權歸公上非利而何又曽有議解鹽鈔欲高其價者增六千為八千伊川曰若增鈔價賣數須減鹽出既衆低價易之人人食鹽鹽不停積歲入必敷已而增鈔價歲額果虧減之而歲入溢溫公初起時欲用伊川伊川曰帶纍人去裏使韓富在時吾猶可以成事後來溫公欲變法伊川使人語之曰切未可動著役法動著即三五年不能得定疊去未幾變之果紛紛不能定溫公作中庸解不曉處闕之或語明道明道曰闕甚處曰如强哉矯之類明道笑曰由自得裏將謂從天命之謂性處便闕却明道嘗論吕微仲曰宰相吕微仲須做只是這漢俗明道先生善言詩他又渾不曽章解句釋但優游玩味吟哦上下便使人有得處瞻彼日月悠悠我思道之云逺曷云能來思之切矣終曰百爾君子不知德行不忮不求何用不臧歸於正也孟子曰養心莫善於寡欲此一句如何謝子曰吾昔亦曽問伊川先生曰此一句淺近不如理義之悅我心猶芻豢之悅我口最親切有滋味然須是體察得理義之悅我心真箇猶芻豢始得明道先生曰操則存舍則亡出入無時非聖人之言也心安得有出入乎問莊周與佛如何伊川曰周安得比他佛佛說直有高妙處莊周氣象大故淺近如人睡初覺時乍見上下東西指天說地怎消得恁地只是家常茶飯誇逞箇甚底吾曽歷舉佛說與吾儒同處問伊川先生曰恁地同處雖多只是本領不是一齊差却謝子與伊川别一年往見之伊川曰相别又一年做得甚工夫謝曰也只去箇矜字曰何故曰子細檢㸃得來病痛盡在這裏若按伏得這箇罪過方有向進處伊川㸃頭因語在坐同志者曰此人為學切問近思者也問有鬼神否明道先生曰待向你道無來你怎生信得及待向你道有來你且去尋討看謝子曰吾嘗習忘以養生明道曰施之養生則可於道則有害習忘可以養生者以其不留情也學道則異於是必有事焉而勿正何謂乎且出入起居寧無事者正心待之則先事而迎忘則涉乎去念助則近於留情故聖人心如鑑孟子所以異於釋氏此也苗履見伊川語及一武帥苗曰此人舊日宣力至多今官高而自愛不肯向前伊川曰何自待之輕乎位愈高則當愈思所以報國者饑則為用飽則揚去是以鷹犬自期也二十年前往見伊川一本作伯淳伊川曰近日事如何某對曰天下何思何慮伊川曰是則是有此理賢却發得太早在伊川直是會鍛鍊得人說了又恰道恰好著工夫也明道初見謝語人曰此秀才展托得開將來可望每進語相契伯淳必曰更須勉力昔伯淳教誨只管著他言語伯淳曰與賢說話却如扶醉漢救得一邊倒了一邊只怕人執著一邊明道先生坐如泥塑接人則渾是一團和氣正叔視伯淳墳嘗侍行問佛儒之辨正叔指牆圍曰吾儒從裏面做豈有不是佛氏只從牆外見了却不肯入來做不可謂佛氏無見處學者先學文鮮有能至道至如博觀泛覽亦自為害故明道先生教余嘗曰賢讀書慎不要尋行數墨謝子見河南夫子辭而歸尹子送焉問曰何以教我謝子曰吾徒朝夕從先生見行則學聞言則識譬如有人服烏頭者方其服也顏色悅澤筋力强盛一旦烏頭力去將如之何尹子反以告夫子夫子曰可謂益友矣昔録五經語作一册伯淳見謂曰玩物喪志明道見謝子記問甚博曰賢却記得許多謝子不覺身汗面赤先生曰只此便是惻隱之心惻然有隱于心伯淳謂正叔曰異日能尊師道是二哥若接引後學隨人才成就之則不敢讓伯淳常談詩並不下一字訓詁有時只轉却一兩字㸃平聲掇地念過便教人省悟石曰古人所以貴親炙之也邢七云一日三㸃檢伯淳曰可哀也哉其餘時多會甚事蓋倣三省之說錯了可見不曽用功又多逐人面上說一般話伯淳責之邢曰無可說伯淳曰無可說便不得不說張橫渠著正䝉時處處置筆硯得意即書伯淳云子厚却如此不熟或舉伯淳語云人有四百四病皆不由自家則是心須教由自家伊川與君實語終日無一句相合明道與語直是道得下堯夫易數甚精自來推長歷者至久必差惟堯夫不然指一二近事當面可驗明道云待要傳與某兄弟某兄弟那得工夫要學須是二十年功夫明道聞說甚熟一日因監試無事以其說推算之皆合出謂堯夫曰堯夫之數只是加一倍法以此知太𤣥都不濟事堯夫驚撫其背曰大哥你恁聰明伊川謂堯夫知易數為知天知易理為知天堯夫云須還知易理為知天因說今年雷起甚處伊川云堯夫怎知某便知又問甚處起伊川云起處起堯夫愕然他日伊川問明道曰加倍之數如何曰都忘之矣因歎其心無偏繫如此舉明道云忠恕兩字要除一箇除不得明道語云病臥於牀委之庸醫比於不慈不孝事親者亦不可不知醫伯淳先生云别人喫飯從脊皮上過我喫飯從肚裏去范夷叟欲同二程去看劚地黃明道率先生先生以前輩為辭明道云又何妨一般是人右三十七條見上蔡語録謝良佐字顯道二先生門人明道云必有關雎麟趾之意然後可行周公法度先生曰明道嘗言學者不可以不看詩看詩便使人長一格價明道在潁昌先生尋醫調官京師因往潁昌從學明道甚喜每言曰楊君最會得容易及歸送之出門謂坐客曰吾道南矣先是建安林志寧出入潞公門下求教潞公云某此中無相益有二程先生者可往從之因使人送明道處志寧乃語定夫及先生先生謂不可不一見也於是同行時謝顯道亦在謝為人誠實但聰悟不及先生故明道每言楊君聰明謝君如水投石然亦未嘗不稱其善伊川自涪歸見學者凋落多從佛學獨先生與謝丈不變因歎曰學者皆流於夷狄矣唯有楊謝二君長進明道先生作縣凡坐處皆書視民如傷四字常曰皓常愧此四字伊川二十四五時吕原明首師事之右四條見龜山語録楊時字中立二先生門人也扶溝地卑歲有水旱明道先生經畫溝洫之法以治之未及興工而先生去官先生曰以扶溝之地盡為溝洫必數年乃成吾為經畫十里之間以開其端後之人知其利必有繼之者矣夫為令之職必使境內之民凶年饑歲免於死亡飽食逸居有禮義之訓然後為盡故吾於扶溝興設學校聚邑人子弟教之亦幾成而廢夫百里之施至狹也而道之興廢繫焉是數事者皆未及成豈不有命與然知而不為而責命之興廢則非矣此吾所以不敢不盡心也右一事見庭聞藁録楊公之子迥所記朱公掞來見明道於汝歸謂人曰光庭在春風中坐了一箇月游楊初見伊川伊川瞑目而坐二子侍立既覺顧謂曰賢輩尚在此乎日既晚且休矣及出門門外之雪深一尺伊川先生在經筵每進講必博引廣喻以曉悟人主講退范堯夫曰先生怎生記得許多先生曰只為不記故有許多若還記却無許多也明道先生謂謝子雖少魯直是誠篤理會事有不透其顙有泚其憤悱如此右三事見侯子雅言侯仲良字師聖二先生之內弟和靜嘗以易傳序請問曰至微者理也至著者象也體用一源顯微無間莫太泄露天機否伊川曰如此分明說破猶自人不解悟祁寬録云伊川曰汝看得如此甚善吕堅中録云伊川曰亦不得已言之耳和靜嘗請曰某今日解得心廣體胖之義伊川正色曰如何和靜曰莫只是樂否伊川曰樂亦沒處著和靜偶學虞書伊川曰賢那得許多工夫思叔詬詈僕夫伊川曰何不動心忍性思叔慙謝暇日靜坐和靜孟敦夫名厚潁川人張思叔侍伊川指面前水盆語曰淸靜中一物不可著才著物便搖動一日置酒伊川曰飲酒不妨但不可過惟酒無量不及亂聖人豈有作亂者事但恐亂其氣血致疾或語言錯顛容貌傾側皆亂也伊川歸自涪州氣貌容色髭髮皆勝平昔門人問何以得此先生曰學之力也大凡學者學處患難貧賤若富貴榮達即不須學也鮑若雨劉安世劉安節數人自大學謁告來洛見伊川問堯舜之道孝弟而已矣堯舜之道何故止於孝弟伊川曰曽見尹焞否曰未也請往問之諸公遂來見和靜以此為問和靜曰堯舜之道止於孝弟孝弟非堯舜不能盡自冬溫夏凊昏定晨省以至聽於無聲視於無形又如事父孝故事天明事母孝故事地察天地明察神明彰矣直至通於神明光於四海非堯舜大聖人不能盡此復以此語白伊川伊川曰極是縱使某說亦不過此右八事涪陵記善録馮忠恕所記尹公語尹名焞字彥明伊川先生門人游定夫酢問伊川曰戒慎乎其所不睹恐懼乎其所不聞便可馴致於無聲無臭否伊川曰固是後謝顯道良佐問伊川如定夫之問伊川曰雖即有此理然其間有多少般數謝曰既云可馴致更有何般數伊川曰如荀子謂始乎為士終乎為聖人此語有何不可亦是馴致之道然他却以性為惡桀紂性也堯舜僞也似此馴致便不錯了楊子安侍郎學禪不信伊川每力攻其徒又使其親戚王元致問難於和靜先生曰六經蓋藥也無病安所用乎先生曰固是只為開眼即是病王屈服以歸伊川自涪陵歸過襄陽子安在焉子安問易從甚處起時方揮扇伊川以扇柄畫地一下曰從這裏起子安無語後至洛中子安舉以告和靜先生且曰某當時悔不更問此畫從甚處起和靜以告伊川伊川曰待他問時只與默然得似箇子安更喜歡也先生舉示子安子安由此遂服伊川與和靜論義命和靜曰命為中人以下說若聖人只有箇義伊川曰何謂也和靜曰行一不義殺一不辜而得天下皆不為也奚以命為伊川大賞之又論動靜之際聞寺僧撞鐘和靜曰說著靜便多一箇動字說動亦然伊川頷之和靜每曰動靜只是一理隂陽死生亦然謝顯道習舉業已知名往扶溝見明道先生受學志甚篤明道一日謂之曰爾輩在此相從只是學某言語故其學心口不相應盍若行之請問焉曰且靜坐伊川每見人靜坐便歎其善學先生曰伊川常愛衣皂或磚褐紬襖其袖亦如常人所戴紗巾背後望之如鐘形其製乃似今道士謂之仙桃巾者然不曽傳得樣不知今人謂之習伊川學者大袖方頂何謂先生在洛中常裹昌黎巾先生常問伊川鳶飛戾天魚躍于淵莫是上下一理否伊川曰到這裏只得㸃頭郭忠孝每見伊川問論語伊川皆不答一日伊川語之曰子從事於此多少時所問皆大且須切問而近思先生曰張思叔一日於伊川坐上理㑹盡心知性知天事天伊川曰釋氏只令人到知天處休了更無存心養性事天也思叔曰知天便了莫更省事否伊川曰子何似顏子顏子猶視聽言動不敢非禮乃所以事天也子何似顏子先生嘗問於伊川如何是道伊川曰行處是先生曰有人問明道先生如何是道明道先生曰於君臣父子兄弟朋友夫婦上求昔劉質夫作春秋傳未成每有人問伊川必對曰已令劉絢作之自不須某費工夫也劉傳既成來呈伊川門人請觀伊川曰却須著某親作竟不以劉傳示人伊川沒後方得見今世傳解至閔公者昔又有蜀人謝湜提學字持正解春秋成來呈伊川伊川曰更二十年後子方可作謝久從伊川學其傳竟不曽敢出張思叔三十歲方見伊川後伊川一年卒初以文聞於鄉曲自見伊川後作文字甚少伊川每云張繹朴茂先生曰初見伊川時教某看敬字某請益伊川曰主一則是敬當時雖領此語然不若近時看得更親切寬問如何是主一願先生善喻先生曰敬有甚形影只收斂身心便是主一且如人到神祠中致敬時其心收斂更著不得毫髮事非主一而何又曰昔有趙承議從伊川學其人性不甚利伊川亦令看敬字趙請益伊川整衣冠齊容貌而已趙舉示先生先生於趙言下有箇省覺處謝收問學於伊川答曰學之大無如仁汝謂仁是如何謝久之無入處一日再問曰愛人是仁否伊川曰愛人乃仁之端非仁也謝收去先生曰某謂仁者公而已伊川曰何謂也先生曰能好人能惡人伊川曰善涵養先生曰司馬溫公平生用心甚苦每患無著心處明道伊川歎其未止一日溫公謂明道某近日有箇著心處甚安明道曰何謂也溫公曰只有一箇中字著心於中甚覺安樂明道舉似伊川伊川曰司馬端明却只是㨂得一箇好字却不如只教他常把一串念珠却似省力試說與時他必不受也又曰著心只那著的是何謝顯道久住太學告行於伊川云將還蔡州取解且欲改經禮記伊川問其故對曰太學多士所萃未易得之不若鄉中可必取也伊川曰不意子不受命如此子貢不受命而貨殖蓋如是也顯道復還次年獲國學解韓持國與伊川善韓在潁昌欲屈致伊川明道預戒諸子姪使置一室至於修治窗户皆使親為之其誠敬如此二先生到暇日與持國同游西湖命諸子侍行行次有言貌不莊敬者伊川回視厲聲叱之曰汝輩從長者行敢笑語如此韓氏孝謹之風衰矣持國遂皆逐去之先生聞於持國之子彬叔名宗質王介甫為舍人時有雜說行於時其粹處有曰莫大之惡成於斯須不忍又曰道義重不輕王公志意足不驕富貴有何不可伊川嘗曰若使介甫只做到給事中誰看得破伊川歸自涪陵謝顯道自蔡州來洛中再親炙焉久之伊川謂先生及張思叔繹曰可去同見謝良佐問之此回見吾有何所得尹張如所戒謝曰此來方會得先生說話也張以告伊川伊川然之周恭叔行已自太學早年登科未三十見伊川持身嚴苦塊坐一室未嘗窺牖幼議母黨之女登科後其女雙瞽遂娶焉愛過常人伊川曰某未三十時亦做不得此事然其進鋭者其退速每嘆惜之周以官事求來洛中監水南糴場以就伊川會伊川有涪陵行後數年周以酒席有所屬意既而密告人曰勿令尹彥明知又曰知又何妨此不害義理伊川歸洛先生以是告之伊川曰此禽獸不若也豈得不害義理又曰以父母遺體偶倡賤其可乎溫州鮑若雨商霖與鄉人十輩久從伊川一日伊川遣之見先生鮑來見且問堯舜之道孝弟而已矣如何先生曰賢悶只為將堯舜做天道孝弟做人道便見得堯舜道大孝弟不能盡也孟子下箇而已字豈欺我哉孝經事父孝故事天明事母孝故事地察只為天地父母只一箇道理諸公尚疑焉先生曰曲禮視於無形聽於無聲亦是此意也諸公釋然歸以告伊川伊川曰教某說不過如是次日先生見伊川伊川曰諸人謂子靳學不以教渠果否先生曰某以諸公逺來依先生之門受學某豈敢輒為他說萬一有少差便不誤他一生伊川頷之王介甫與曽子固鞏善役法之變皆曽參酌之晚年亦相暌伊川常言今日之禍亦是元祐做成以子瞻定役法凡曰元豐者皆用意更改當時若使子固定必無損益者又是他黨中自可杜絶後人議也因其暌必能變之况又元經他手當知所裁度也此坐元祐術故也伊川每曰靑苗決不可行舊役法大弊須量宜損益此假可疑伊川論國朝名相必曰李文靖伊川與韓持國善嘗約候韓年八十一往見之闕間正月一日因弟子賀正乃曰某今年有一債未還春中須當暫往潁昌見韓持國蓋韓八十也春中往造焉久留潁昌韓早晚伴食體貌加敬一日韓密謂子彬叔曰先生逺來無以為意我有黃金藥楪一重二十兩似可為先生壽然未敢遽言我當以他事使子侍食因從容道吾意彬叔侍食如所戒試啓之先生曰某與乃翁道義交故不逺而來奚以是為詰朝遂歸韓謂彬叔曰我不敢面言政謂此爾再三謝過而别王子真佺期來洛中居於劉壽臣園亭中一日出謂園丁曰或人來尋慎勿言我所向是日富韓公來見焉不遇而還子真晚歸又一日忽戒灑掃又於劉丐茶二杯炷香以待是日伊川來款語終日蓋初未嘗夙告也劉詰之子真曰正叔欲來信息甚大又嵩山前有董五經隱者也伊川聞其名謂其為窮經之士特往造焉董平日未嘗出菴是日不值還至中塗遇一老人負茶果以歸且曰君非程先生乎伊川異之曰先生欲來信息甚大某特入城置少茶果將以奉待也伊川以其誠意復與之同至其舍語甚款亦無大過人者但久不與物接心靜而明也先生問於伊川伊川曰靜則自明也先生嘗問伊川春秋解伊川每曰已令劉絢去編集俟其來一日劉集成呈於伊川先生復請之伊川曰當須自做也自涪陵歸方下筆竟不能成書劉集終亦不出孟敦夫厚來伊川又從王氏而舉業特精獨處一室糞穢不治嘗獻書於伊川伊川曰孟厚初時說得也似其後須沒事生事一日語之曰子胡不見尹焞張繹朋友間最好講學然三公皆同齒也敦夫來見先生曰先生令某來見二公若彥明則某所願見如思叔莫不消見否先生曰只不消見思叔之心便是不消見某之心也伊川嘗謂學者曰孟厚不治一室竟亦何益學不在此假使掃灑得潔淨莫更快人意否寬因問伊川謂永叔如何先生曰前輩不言人短每見人論前輩則曰汝輩且取他長處橫渠昔在京師坐虎皮說周易聽從甚衆一夕二程先生至論易次日橫渠撤去虎皮曰吾平日為諸公說者皆亂道有二程近到深明易道吾所弗及汝輩可師之逐日虎皮出是日更不出虎皮也橫渠乃歸陜西先生曰昔與范元長同見伊川偶有幹先起下階伊川謂范曰君看尹彥明他時必有用於世明道說仁宗一日問折米折幾分曰折六分怪其太甚也有㫖只令折五分次供進偶覺藏府曰習使然也却令如舊又禁中進膳飯中有砂石含以密示嬪御曰切勿語人朕曽食之此死罪也又一日思生荔枝有司言已供盡近侍曰市有鬻者請買之上曰不可令買之來歲必增上供之數流禍百姓無窮又一日夜中甚飢思燒羊頭近侍乞宣取上曰不可今次取之後必常備日殺三羊暴殄無窮竟夕不食先生曰楊中立答伊川論西銘書云云尾說渠判然無疑伊川曰楊時也未判然先生曰某才十七八歲見蘇季明教授時某亦習舉業蘇曰子修舉業得狀元及第便是了也先生曰不敢望此蘇曰子謂狀元及第便是了否唯復這學更有裏先生疑之日去見蘇乃指先生見伊川後半年方得大學西銘看先生與思叔共學之久一日伊川問二子尋常見處同否為我言之先生曰某不逮思叔如凡有請問未達必三四請益尚有未得處久之乃得如思叔則先生才說便㸃頭會意往往造妙只是某雖愚鈍自保守得若思叔則某未敢保他伊川笑曰也是也是自後每同請益退伊川必謂諸郎曰張秀才如此不待尹秀才肯待南方學者從伊川既久有歸者或問曰學者久從學於門誰最是有得者伊川曰豈便敢道他有得處且只是指與得箇岐徑令他尋將去不錯了已是忒大㬠若夫自得尤難其人謂之得者便是已有也豈不難哉若論隨力量而有見處則不無其人也司馬溫公修通鑑伊川一日問修至何代溫公曰唐初也伊川曰太宗肅宗端的如何溫公曰皆篡也伊川曰此復何疑伊川曰魏徵如何溫公曰管仲孔子與之某於魏徵亦然伊川曰管仲知非而反正忍死以成功業此聖人所取其反正也魏徵只是事讐何所取耶溫公竟如舊說管仲雖初有過善補者也魏徵初實無過者也功業雖多何足法乎與叔問伊川曰某見孟子亦有疑處舜為法於後世我猶未免為鄉人憂之如何如舜而已伊川曰聖人憂則有之疑則無夫何故人所當憂不得不憂如孔子是吾憂也若疑則無之矣先生曰近有人說伊川自比孔孟先生曰某不識明道每見伊川說學問某豈敢比先兄由是推之決無此語也先生曰悟則句句皆是這箇道理道理已明後無不是此事也如孔子謂六十而耳順聞無不通然後可至不踰矩也明道作洛河竹木務時過一寺門墻上有人題要不悶守本分時田明之隨行明道每過必曰好語一日明之問之明道曰只被人不守本分也後先生聞此語復問伊川伊川曰只為人不能盡分先生謂寬曰看伊川此語豈不是悟則句句是凡一言一句便推到極處看盡分字是大小氣象又謂寬曰才說盡分便不消說悶也先生曰伊川易序既成其中有曰體用一源顯微無間先生告伊川曰似太泄漏天機伊川曰汝看得如此甚善伊川作詩序二篇昔人傳之不真先生一日請問曽作否伊川曰有之但不欲示人再三請乃得之曰為子出此二篇今傳之者是也先生一日看大學有所得欲舉似伊川伊川問之先生曰心廣體胖只是自樂伊川曰到這裏和樂字也著不得右四十一條見祁寬所記尹和靜語寬字居之先生云初見伊川先生一日有江南人鮑某守官西京見伊川問仁曰仁者愛人便是仁乎伊川曰愛人仁之事耳先生時侍坐歸因取論語中說仁事致思久之忽有所得遂見伊川請益曰某以仁惟公可盡之伊川沈思久之曰思而至此學者所難及也天心所以至仁者惟公爾人能至公便是仁伊川使人抄范純夫唐鑑先生問曰此書如何伊川曰足以垂世唐鑑議論多與伊川同如中宗在房陵事之類伊川自涪陵歸易傳已成未嘗示入門弟子請益有及易書者方命小奴取書篋以出身自發之以示門弟子非所請不敢多閲一日出易傳序示門弟子先生受之歸伏讀數日後見伊川伊川問所見先生曰某固欲有所問然不敢發伊川曰何事也先生曰至微者理也至著者象也體用一源顯微無間似太露天機也伊川歎美曰近日學者何嘗及此某亦不得已而言焉耳明道嘗謂人曰天下事只是感與應耳先生初聞之以問伊川曰此事甚大人當自識之先生曰綏之斯來動之斯和是亦感與應乎曰然門弟子請問易傳事雖有一字之疑伊川必再三喻之蓋其潛心甚久未嘗容易下一字也先生又云見王信伯云昔時問鼓萬物而不與聖人同憂之意於張思叔思叔對曰堯舜其猶病諸後因侍伊川伊川問鼓萬物而不與聖人同憂如何說則對以思叔之語伊川曰不然天地以無心故不憂聖人致有為之事故憂游定夫問伊川戒慎乎其所不睹恐懼乎其所不聞及其至也至於無聲無臭乎伊川曰馴此可以至矣後先生與周恭叔以此語問伊川伊川曰然其間亦豈無事恭叔請問伊川曰如荀子云學者始乎為士終乎聖人可以明之昔嘗請益於伊川曰某謂動靜一理伊川曰試諭之適聞寺鐘聲某曰譬如此寺鐘方其未撞時聲固在也伊川喜曰且更涵養有人說無心伊川曰無心便不是只當云無私心游定夫忽自太學歸蔡過扶溝見伊川伊川問試有期何以歸也定夫曰某讀禮太學以是應試者多而鄉舉者實少伊川笑之定夫請問伊川曰是未知學也豈無義無命乎定夫即復歸太學是歲登第定夫字誤當作顯道昔見伊川問易乾坤二卦斯可矣伊川曰聖人設六十四卦三百八十四爻後世尚不能了乾坤二卦豈能盡也既坐伊川復曰子以為何人分上事對曰聖人分上事曰若聖人分上事則乾坤二卦亦不須況六十四乎伊川所戴帽桶八寸簷七分四直鮑若雨與同志數人見伊川問堯舜之道孝弟而已矣恐孝弟不足以盡堯舜之道伊川令與和靜商量諸人見和靜和靜對曰此何所疑孝以事親弟以事長能盡孝弟之道者惟堯舜能之諸人未喻和靜曰且如孝子視於無形聽於無聲孝弟之至通於神明且道此箇道理如何鮑復見伊川伊川曰某亦不過如此說鮑又曰尹秀才直是袐此道不肯容易說伊川後問之和靜曰此道衆所公共某何敢祕其說但恐一語有差則有纍學者伊川曰某思慮不及張思叔與和靜侍伊川伊川問曰賢輩尋常商量事有疑處否對曰張某所說某不疑某所說張某不疑張某聰明道頭知尾某必待再三問然後曉然但恐張某守不定如某伊川喜右十四條見吕堅中所記尹和靜語堅中字景實問將孔子之言切要處思索如何曰須是熟看語孟玩味咀嚼伊川云若熟看語録亦自得者此也當時門人有問且將語孟緊要處看如何伊川曰固是好若有得終不浹洽蓋吾道非如釋氏一見了便從空寂去問伊川說人之生也直是天命之謂性謝顯道云順理之謂直竊謂順理是率性之事天命之性無待於順理也二說異同曰伊川說上一截顯道說下一截先生曰明道猶有謔語若伊川則全無問如何謔語曰明道聞司馬溫公解中庸至人莫不飲食鮮能知味有疑遂止笑曰我將謂從天命之謂性便疑了伊川直是謹嚴坐間無問尊卑長幼莫不肅然一日偶見秦少游問天若知也和天瘦是公詞否少游意伊川稱賞之拱手遜謝伊川云上穹尊嚴安得易而侮之少游面色騂然先生曰伊川年四十以後記性愈進今人年長則健忘豈可不知其故哉伊川涪陵之行過灔澦波濤洶湧舟中之人皆驚愕失措獨伊川凝然不動岸上有樵者厲聲問曰舍去如斯達去如斯欲答之而舟已行右五條見震澤語録王蘋信伯門人信州周憲所記說之見伊川先生論曽子易簀事先生曰是禮也君子所以貴乎禮者為其以之而生以之而死如此其明也說之曰是禮古人孰不然蓋曽子獨有傳焉爾後世之士自賤其身而絶於禮此事始廢或者似有得於此而蔽於浮屠老子虛誕之說乃不謂之理而謂之達安知吾道之所以貴哉先生曰然右一事見眺詹事文集說之以道神宗問明道以張載邢恕之學奏云張載臣所畏邢恕從臣游伊川謂明道曰吾兄弟近日說話太多明道曰使見吕晦叔則不得不少見司馬君實則不得不多張子正䝉云冰之融釋海不得而與焉伊川改與為有游定夫問伊川陰陽不測之謂神伊川曰賢是疑了問是揀難底問元祐中客有見伊川者凡案間無他書惟印行唐鑑一部先生曰近方見此書三代以後無此議論右五條見眺氏客語不知何人所録正獻公既薦常秩後差改節嘗對伯淳有悔薦之意伯淳曰願侍郎寧百受人欺不可使好賢之心少替公敬納焉伊川嘗言今僧家讀一卷經便要一卷經中道理受用儒者讀書却只閒了都無用處伊川先生言人有三不幸年少登高科一不幸席父兄之勢為美官二不幸有高才能文章三不幸也明道先生嘗至禪寺方飯見趨進揖遜之盛歎曰三代威儀盡在是矣右四條見吕氏童蒙訓吕本中字居仁原明侍講之孫有言鬼物於伊川先生者先生云君曽親見邪伊川以為若是人傳必不足信若是親見容是眼病尹彥明與思叔同時師事伊川先生思叔以高識彥明以篤行俱為先生所稱先生沒思叔亦病死彥明窮居教學未嘗少自貶屈常以伊川教人專以敬以直內為本彥明獨能力行之彥明嘗言先生教人只是專令用敬以直內若用此理則百事不敢輕為不敢妄作不愧屋漏矣習之既久自然有所得也因說往年先生歸自涪陵日日見之一日因讀易至敬以直內處因問先生不習無不利時則更無睹當更無計較也耶先生深以為然且曰不易見得如此且更涵養不要輕說眺以道常說頃嘗以書問伊川先生云某平生所願學者康節先生也康節先生沒不可見康節之友惟先生在願因先生問康節之學伊川答書云某與堯夫同里巷居三十年餘世間事無所不論惟未嘗一字及數耳崇寧初家叔舜從以黨人子弟補外官知河南府鞏縣請見伊川先生問當今新法初行當如何做先生云只有義命兩字當行不當行者義也得失禍福命也君子所處只說義如何耳以道見伊川先生論難反復以道曰如此是先生亦欲人同已先生不答門人云先生所欲同者非同已也正欲道之同耳崇寧元年叔父舜從至洛中請見伊川先生先生召食食五品亦甚豐潔坐間問事甚衆先生一一酬答臨行又請教語甚詳既而微笑云只被公家學佛伊川先生甚愛表記中說君子莊敬日强安肆日偷蓋常人之情才放肆則日就曠蕩自檢束則日就規矩右八事吕氏雜志同上伊川先生自涪州順流而歸峽江峻急風作浪湧舟人皆失色而先生端坐不動岸旁有問者云達後如此舍後如此伊川先生意其非凡人也欲起揖之而舟去逺矣親見吕舍人十一丈說按此段已見邵氏見聞録及震澤語録恐當以邵氏所記為正伊川先生自涪州歸過襄州楊畏為守待之甚厚先生曰某罪戾之餘安敢當此畏曰今時事已變先生曰時事雖變某安敢變此乃劉子駒處見其祖所録今省記此右二事汪端明記右諌議大夫孔文仲言謹按通直郎崇政殿說書程頤人物纖汙天資憸巧貪黷請求元無鄉曲之行奔走交結常在公卿之門不獨交口褒美又至連章論奏一見而除朝籍再見而升經筵臣頃任起居舍人屢侍講席觀某陳說凡經義所在全無發明必因藉一事泛濫援引借無根之語以搖撼聖聽推難引之迹以眩惑淵慮上德未有嗜好而常啓以無近酒色上意未有信向而常開以勿用小人豈惟勸導以所不為實亦矯欺以所無有每至講罷必曲為卑佞附合之語借如曰雖使孔子復生為陛下陳說不過如此又如曰伏望陛下燕閒之餘深思臣之說無忘臣之論又如曰臣不敢子細敷奏慮煩聖聽恐有所疑伏乞非時特賜宣問容臣一一開陳當陛下三年不言之際頤無日無此語以感切上聽陛下亦必黽勉為之應答又如陛下因咳嗽罷講及御邇英學士以下侍講讀者六七人頤官最小乃越次獨候問聖體橫僭過甚並無職分如唐之王伾王叔文李訓鄭注是也右孔文仲章疏按文仲所言雖極其誣詆然所載經筵進說尤見先生所以愛君之心有門弟子所不及聞者故今特附於此吕申公家傳去文仲本以伉直稱然蠢不曉事為浮薄輩所使以害善良晚乃自知為小人所紿憤鬱嘔血而死然則此疏不掩防微納忠之善言乃其伉直所發而凡醜詆無根之語則為浮薄輩所使而晚乃悔之者也二程外書卷十二
