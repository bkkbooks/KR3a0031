body:
  text: 二程外書卷六宋朱子編羅氏本拾遺凡看書各有門庭詩易春秋不可逐句看尚書論語可以逐句看赤舄几几只是形容周公一箇氣象乃孟子所謂睟面盎背四體不言而喻之意雍雍在宫肅肅在廟亦只是形容文王氣象大抵古人形容聖人多此類如倬彼雲漢為章于天亦是形容聖人也不識不知言文王化其民日用不知皆由天理也與子游聞之當作於子游聞之若兩人同聞安得一箇知一箇不知利字不聨牝馬為義如云利牝馬之貞則坤便只有三德陰必從陽然後乃終有慶也黃中色裳宜在下則元吉他卦皆有悔凶咎惟謙未嘗有他卦有待而亨惟謙則便亨謙君子所以有終故不言吉裒取其多而增益其寡天理也六二鳴謙處中得正而有德者故鳴謙者乃中心得也上六鳴謙乃有求者也有求之小止於征國邑而已故曰志未得也蹇以反身修德故往者在外也在外必蹇來者在內也在內則有譽無尤來連朋來來碩皆反身修德之謂也蹇蹇不暴進內顧之象也暴進出外則無事矣連音平連則無窮也朋來則衆來言朋來未免於有思也至於來碩則來處於大人之事也故曰從貴闔闢便是易一闔一闢謂之變堯之親九族以明俊德之人為先蓋有天下國家者以知人為難以親賢為急善學者要不為文字所梏故文義雖解錯而道理可通行者不害也論語曾子有子弟子論撰所以知者唯曽子有子不名伊川學而時習之鷹乃學習之義子路有聞未之能行唯恐有聞說在心樂主發散在外伊川孝弟本其所以生乃為仁之本孝弟有不中理或至於犯上然亦鮮矣孟子曰孰不為事事親事之本也孰不為守守身守之本也不失其身而事親乃誠孝也推此亦可以知為仁之本明道敬事而信以下事論其所存未及治具故不及禮樂刑政伊川行有餘力者當先立其本也有本而後學文然有本則文自至矣明道致身猶言致力乃委質也明道人安重則學堅固伊川禮之用和為貴有不可行者偏也伊川貧而能樂富而能好禮隨貧富所治當如此子貢引切磋琢磨蓋治之之謂也若貧而言好禮則至於卑富而言樂則至於驕然貧而樂非好禮不能富而好禮非樂不能明道為政以德然後無為伊川回於孔子之道無所不說故如愚退而省其所自得亦足以開發矣故曰不愚視其所以所為也觀其所由所從也察其所安所處也察其所處則見其心之所存在巳者能知言窮理則能以此察人如聖人也明道君子不器無所不施也若一材一藝則器也伊川子貢問君子孔子告以先行其言而後從之而可以為君子因子貢多言而發也伊川先行其言而後從之謂觀人者彼能先行其言吾然後信之伊川周謂周旋不比謂不相私比也伊川學而不思則無得故罔思而不學則不進故殆博學之審問之慎思之明辨之篤行之五者廢其一非學也伊川尤罪自外至也悔理自內出也修天爵則人爵至祿在其中矣子張學干祿故告之以此使定其心而不為利祿動若顏閔則不然矣君子謀道不謀食學也祿在其中矣然學不必得祿猶耕之不必得食亦有餒在其中矣君子知其如此故憂道不憂貧此所以告干祿也伊川奢自文生文過則為奢不足則為儉文者稱實而為飾文對實已為兩物奢又文之過則去本逺矣儉乃文不足此所以為禮之本伊川仁者如射射而不中不怨勝巳者反求諸巳而巳豈有爭也故曰其爭也君子伊川下而飲非謂下堂而飲離去射位而飲也若下堂而飲則辱之甚無此伊川素喻質繪喻禮凡繪先施素地而加采如有美質而更文之以禮伊川灌以降神禘之始也既灌而往者自始以至終皆無足觀言魯祭之非禮也不知者蓋為魯諱如自此事而正之其於天下如指掌之易伊川為力猶言為功射有五善為功不一故曰不同科所謂五善者觀德行别邪正辨威儀云云伊川事君盡禮在他人言之必曰小人以為諂也聖人道𢎞故止曰人以為諂也伊川樂得淑女以配君子不淫其色是樂而不淫哀窈窕思賢才求之不得展轉反側是哀而不傷明道成事不說至既往不咎者大槩相似重言之所以深責之也如今人嗟惜一事未嘗不再三言之也伊川成湯放桀惟有慙德武王亦然故未盡善堯舜湯武其揆一也征伐非其所欲所遇之時然耳伊川里居也擇仁而處之為美明道知者利仁知者以仁為利而行之至若欲有名而為之之類皆是以為利也知者知仁為美擇而行之是利仁也心有其仁故曰利伊川君子懷德惟善之所在小人懷土惟事之所在君子懷刑惟法之所在小人懷惠惟利之所在伊川子貢問賜也何如賜自矜其長而孔子以瑚璉之器答者但瑚璉可施禮容於宗廟如子貢之才可使於四方可使與賓客言而已伊川未能自信不可以治人孔子所以說漆雕開之對明道子貢常方人故孔子答以不暇而又問與回也孰愈所以抑其方人也聞一知十聞一知二舉多少而言也曰吾與女弗如也使子貢喻其言知其在勉不喻則亦可使慕之皆有教也不欲人之加諸我者施諸巳而不願者也無加諸人者巳所不欲勿施於人者也此無伐善無施勞者能之故非子貢所及伊川夫子言性與天道不可得而聞唯子貢親達其理故能為是歎美之辭言衆人不得聞也伊川蔡與采同大夫有采地而為山節藻棁之事不知也山節藻棁諸侯之事也伊川三月不違仁言其久也然非成德之事祝鮀之佞所謂巧言宋朝之美所謂令色當衰世非此難免伊川上知高逺之事非中人以下所可告蓋踰涯分也伊川民之所宜者務之所欲與之聚所惡勿施爾也人之所以近鬼神而䙝之者蓋惑也故有非鬼而祭之淫祀以求福知者則敬而逺之明道知如水之流仁如山之安動靜仁知之體也動則自樂靜則自壽非體仁知之深者不能如此形容之伊川觚之為器不得其法制則非觚矣舉一器而天下之物莫不皆然天下之事亦猶是也伊川宰我言如井中有人仁者當下從之否子曰君子可使之往不可陷以非其所履可欺以其方難罔以非其道明道博學於文而不約之以禮必至於汗漫所謂約之以禮者能守禮而由於規矩者也未及知之也止可以不畔而已多聞擇其善者而從之多見而識之知之次也與此相近顏淵曰博我以文約我以禮欲罷不能是已知之而進不止者也明道中庸之德不可須臾離民鮮有久行其道者也伊川聖則無大小至於仁兼上下大小而言之博施濟衆亦仁也愛人亦仁也堯舜其猶病諸者猶難之也博則廣而無極衆則多而無窮聖人必欲使天下無一人之惡無一物不得其所然亦不能故曰病諸修已以安百姓亦猶是也伊川人於文采皆不曰吾猶人也皆曰勝於人爾至於躬行君子則吾未見其人也伊川泰伯知王季之賢必能開基成王業故為天下而三讓之言其公也明道泰伯三以天下讓者立文王則道被天下故泰伯以天下之故而讓之也不必革命使紂賢文王為三公矣伊川凡人有所計校者皆私意也孟子曰惟仁者為能以大事小仁者欲人之善而矜人之惡不計校小大强弱而事之故能保天下犯而不校亦樂天順理者也伊川人而不仁君子當教養之不盡教養而惟疾之甚必至於亂明道為學三年而不至於善是不善學也明道亂治也師摯始治關雎之樂其聲洋洋乎盈耳哉美之也明道洋洋盈耳美也孔子反魯樂正雅頌各得其所其後自太師而下入河蹈海由樂正魯不用而放棄之也伊川禹吾無間然矣言德純完無可非間明道子罕言利非使人去利而就害也蓋人不當以利為心易曰利者義之和以義而致利斯可矣罕言仁者以其道大故也論語一部言仁豈少哉蓋仁者大事門人一一紀録盡平生所言如此亦不為多也伊川吾有知乎哉無知也者盡以告人他無知也與吾無隱乎爾同伊川叩就也兩端猶言兩頭謂始終告鄙夫也伊川鳯鳥不至河不出圖吾已矣夫者嗜欲將至有開必先也伊川可與共學所以求之也可與適道知其所往也可與立者篤志固執而不變也權與權衡之權同稱物而知其輕重者也人無權衡則不能知輕重聖人則不以權衡而知輕重矣聖人則是權衡也伊川寢食不當言語時必齊如也臨祭則敬也明道色斯舉矣不至悔吝翔而後集審擇其處明道山梁雌雉得其時遂其性而人逢亂世反不得其所子路不達故共具之孔子俾子路復審言詳意故三嗅而起庶子路知之也伊川先進猶言前輩也後進猶言後輩也先進之於禮樂有其誠意而質也故曰野人後進之於禮樂習其容止而文者也故曰君子孔子患時之文弊而欲救之以質故曰如用之則吾從先進取其誠意之多也明道先進於禮樂野人也謂其質朴後進於禮樂君子也謂其得宜周末文弊當時之人自謂得宜而以古人為質朴故孔子欲從古人古人非質朴也伊川從我於陳蔡者皆不及門言此時皆無及孔子之門者思其人故數顏子以下十人有德行者政事者言語者文學者皆從於陳蔡者也明道四科乃從夫子於陳蔡者爾門人之賢者固不止此曽子傳道而不與焉故知十哲世俗之論也明道閔子之於父母昆弟盡其道而處之故人無非間之言伊川過猶不及如琴張曽晳之狂皆過也然而行不掩焉是無實也明道才高者過過則一出一入卑者不及則怠惰廢弛明道師商過不及其弊為楊墨楊出於義墨出於仁仁義雖天下之美然如此者失之毫釐謬以千里伊川曽子少孔子始也魯觀其後明道豈魯也哉明道善人非豪傑特立之士不能自達者也苟不履聖賢之迹則亦不入其奧故為邦必至於百年乃可以勝殘去殺也孟子以樂正子為善人信人有諸巳之謂信能充實之可以至於聖賢然其始必循轍迹而後能入也論篤言之篤厚者也取於人者惟言之篤厚者是與君子者乎色莊者乎未可知也不可以論篤遂與之必觀其行事乃可也明道一日克己復禮天下歸仁者言一旦能克己復禮則天下稱其仁非一日之間也伊川子路之言信故片言可以折獄伊川宿謂預也非一宿之宿也伊川子張少仁無誠心愛民則必倦而不盡心者也故孔子因問而告之伊川先之勞之者昔周公師保萬民易曰以左右民師保左右先之也勞勉也又勞勉之伊川子路問政孔子既告之矣及請益則曰無倦而已未嘗復有所告姑使深思之也明道凡有物有形有形則有名有名則有理如以大為小以高為下則言不順至於民無所措手足也苟有用我朞月而已可也三年有成如何曰昔在經筵時嘗說因言陛下若以朞月之事問臣臣便以朞月之事對若以三年之事問臣臣便以三年之事對朞月而已者整頓大綱也若夫有成則在三年也然朞月三年之說今世又不同須從頭整理可也漢公孫𢎞言三年而化臣竊遲之李石對唐文宗以為陛下責治太急皆率爾之言本不知朞月三年之事伊川三十年為一世三十壯有室也必世而後仁化浹也伊川冉子謂季氏之所行為政孔子抑之曰其事也言季氏之家事而已謂之政者僭也如國有政吾雖不用猶當與聞之也伊川言不必信行不必果唯義所在大人之事言必信行必果硜硜然小人之事小人對大人為小非為惡之小人也故亦可以為士明道剛者堅之體發而有勇曰毅木者質朴訥者遲鈍此四者比之巧言令色則近於仁亦猶不得中行而與狂狷也伊川切切如體之相磨偲偲則以意此言告子路故曰切切偲偲怡怡如也明道善人教民七年亦可以即戎聖人度其時可矣如小國五年大國七年云伊川原憲孔子高弟問有所未盡蓋克伐怨欲四者無然後可以為仁有而不行未至於無故止告之以為難伊川邦有道穀邦無道穀恥也此泛舉也直哉史魚不若君子哉蘧伯玉然則危言危行危行言遜乃孔子事也危猶獨也與衆異不安之謂邦無道行雖危而言不可不遜也明道直哉史魚不若君子哉蘧伯玉卷而懷之乃危行言遜也危行者嚴厲其行而不苟言則當遜伊川晉文公譎而不正齊桓公正而不譎此為作春秋而言也晉文公實有勤王之心而不知召王之為不順故譎掩其正齊桓公伐楚責包茅雖其心未必尊王而其事則正故正掩其譎孔子言之以為戒正者正行其事耳非大正也亦猶管仲之仁止以事功而言也伊川桓公殺公子糾管仲不死而從之殺兄之人固可從乎曰桓公子糾襄公之二弟也桓公兄而子糾弟也襄公死則桓公當立此以春秋知之也春秋書桓公則曰齊小白言當有齊國也於子糾則止曰糾不言齊以不當有齊也不言子非君嗣子也公穀並注四處皆書納糾左傳獨言子糾誤也然書齊人取子糾殺之者齊大夫嘗與魯盟于蔇既欲納糾以為君又殺之故書子是二罪也管氏始事糾不正也終從於正義也召忽不負所事亦義也如魏徵王圭不死建成之難而從太宗可謂害於義矣伊川君子固窮者固守其窮也伊川知及之仁不能守之此言中人以下也若夫真知未有不能行者伊川民於為仁甚於畏水火水火猶有蹈而死者言民之不為仁也伊川為仁在已無所與讓也明道諒與信異自大體是信亮必為也明道諒固執也與亮同古字通用孟子曰君子不亮烏乎執伊川性相近對習相逺而言相近猶相似也上智下愚才也性則皆善自暴自棄然後不可移不然則可移伊川吾其為東周乎若用孔子必行王道東周衰亂所不肯為也亦非革命之謂也明道恭則不侮蓋一恭則仁道盡矣又寬以得衆信為人所任敏而有功惠以使人行五者於天下其仁可知矣明道佛肸召子必不徒然其往義也然終不往者度其終不足與有為也六言六蔽正與恭而無禮則勞寬而栗剛而無虐之義蓋好仁而不好學乃所以愚非能仁而愚徒好而不知學乃愚明道二南人倫之本王化之基苟不為之則無所自入古之學者必興於詩不學詩無以言故猶正墻面而立明道孟子曰教亦多術矣豫不屑之教誨也者是亦教誨之而已矣孔子不見孺悲所以深教之也明道君子不施其親施與也言其不私其親昵也伊川與人交際之道則子張為廣聖人亦未嘗拒人也明道日知其所無月無忘其所能此可以為人師法矣非謂此可以為人師道學不博則不能守約志不篤則不能力行切問近思在巳者則仁在其中矣明道望之儼然秉天陽高明氣象即之也溫中心和易而接物也溫備人道也聽其言也厲則如東西南北正定地道也蓋非禮勿言也君子之道三才備矣明道大德不踰間指君臣父子之大義小德如援溺之事更推廣之伊川學既優則可以仕仕既優則可以學優裕優閒一也伊川子張既除喪而見豫之琴扣之而和彈之而成聲作而曰先王制禮不敢不至焉推此言之子張過於薄故難與並為仁矣明道子貢言性與天道以夫子聰明而言綏之斯來動之斯和以夫子德性而言伊川因民之所利而利之若耕稼陶漁皆因其順利而道之明道知言之善惡是非乃可以知人孟子所謂知言是也必有諸已然後知言知之則能格物而窮理伊川今之城郭不為保民君子道𢎞故可大受而不可小了知測此孟子所以四十不動心小人反是明道有若等自能知夫子之道假使汚下必不為阿好而言謂其論可信也伊川惻惻然隱如物之隱應也此仁之端緒赤子入井其顙有泚推之可見伊川墨子愛其兄之子猶鄰之子墨子書中未嘗有如此等言但孟子拔本塞源知其流必至於是故直之也伊川廣居正位大道一也不處小節即是廣居事親若曽子而曰可者非謂曽子未盡善也人子事親豈有大過曽子孟子之心皆可見矣明道君仁莫不仁君義莫不義天下之治亂係乎人君仁不仁耳離是而非則生於其心必害於其政豈待乎作之於外哉昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心心既正然後天下之事可從而理也夫政事之失用人之非知者能更之直者能諌之然非心存焉則一事之失救而正之後之失者將不勝救矣格其非心使無不正非大人其孰能之伊川君子小人澤及五世者善惡皆及後世也伊川可以仕則仕可以止則止可以久則久可以速則速此皆時也未嘗不合中故曰君子而時中伊川孔子於孺悲所謂不屑之教誨者也伊川命皆一也莫之致而至者正命也桎梏而死者君子不謂命伊川恕者入仁之門伊川仁理也人物也以仁合在人身言之乃是人之道也伊川充實而有光輝所謂修身見於世也伊川帶蓋指其近處下猶舍也離也古人於一帶必皆有意義不下帶而道存猶云只此便有至理存焉此假伊川語得之馬時伸經德不回乃教上等人禍福之說使中人以下知所畏懼修省亦自然之理耳若釋氏怖死以學道則立心不正矣明道二程外書卷六
