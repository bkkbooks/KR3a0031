body:
  text: 二程外書卷四宋朱子編程氏學拾遺格物者格至也物者凡遇事皆物也欲以窮至物理也窮至物理無他唯思而已矣思曰睿睿作聖聖人亦自思而得况於事物乎惟聖人可以踐形者人生稟五行之秀氣頭圓足方以肖天地則形色天性也惟聖人為能盡人之道故可以踐形人道者君臣父子兄弟夫婦之類皆是也唯仁者能好人能惡人仁者用心以公故能好惡人公最近仁人循私欲則不忠公理則忠矣以公理施於人所以恕也天下之言性也則故而已矣故者以利為本故者舊也言凡物之初未嘗不以順利為主謂之利者唯不害之謂也一篇之義皆欲順利之而已文王望道而未之見謂望天下有治道太平而未得見也武王不泄邇不忘逺者謂逺邇之人之事也人心之所同然者何也謂理也義也何謂理何謂義學者當深思漢之儒者所以從學者數百人非惟風俗亦皆篤行君子也晉人高尚不足道矣質夫曰盡心知性佛亦有至此者存心養性佛本不至此先生曰盡心知性不假存養其惟聖人乎質夫云頻復不已遂至迷復二程外書卷四
  hash: sha256:4cd99bc436032b016ce5bba595959d27738089162052aa3fae8a95fe329ad835
