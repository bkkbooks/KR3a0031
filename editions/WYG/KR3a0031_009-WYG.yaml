body:
  text: 二程外書卷九宋朱子編春秋錄拾遺詩書易言聖人之道備矣何以復作春秋蓋春秋聖人之用也詩書易如律春秋如斷案詩書易如藥方春秋如治法始隱周之衰也終麟感之始也世衰道不行有述作之意舊矣但因麟而發耳麟不出春秋亦須作也元年標始年耳猶家人長子呼大郎先儒穿鑿不可用或言絶筆後王者可革命大非也孔子時唯可尊周孟子時方可革命時變然也前一日不可後一日不可范文甫問趙盾弑其君夷臯又問許世子弑其君買皆從傳説春秋書戰以戰之者為客受戰者為主以此見聖人深意蓋彼無義來戰則必上告於天子次告於方伯近赴於鄰國不如是而與之戰者是以聖人深責之也若不得已而與之戰者則異文以示意來戰于乾時是也公羊説春秋書弟謂母弟此大害義禽獸則知母而不知父人必知本豈論同母與不同母乎桓宣與聞乎弑然聖人如其意而書即位與僖文等同辭則其惡自見乃所以深責之也定公至六月方即位又以見季氏制之也始隱孫明復之説是也孫大槩唯解春秋之法不見聖人所寓微意若如是看有何意味乎蒯聵得罪於父不得復立輒亦不得背其父而不與共國委於所可立使不失先君之社稷而身從父則義矣春秋大抵重嫡妾之分及用兵土功嘗因説伐顓臾事對上言春秋重兵如來戰于郎潞公甚喜二程外書卷九
