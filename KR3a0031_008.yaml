body:
  text: 二程外書卷八宋朱子編游氏本拾遺問文中子圓者動方者靜先生曰此正倒説了靜體圓動體方問管仲設使當初有必死之理管仲還肯死否曰董仲舒道得好惟仁人正其誼不謀其利明其道不計其功問知崇禮卑曰崇的便是知卑的便是禮問充塞乎天地之間莫是用於天地間無窒礙處否曰此語固好然孟子却是説氣之體問寢不尸曰毋不敬因論持其志先生曰只這箇也是私然學者不恁地不得古者大享夫人有見賓之禮南子雖妾靈公既以夫人處之使孔子見於是時豈得不見天且不違况於鬼神乎鬼神言其功用天言其主宰天下雷行物與无妄先天後天言合乎天理也人欲則偽矣古人善推其所為而已矣此特告齊宣云爾聖人則不待推仲尼聖人其道大當定哀之時人莫不尊之後弟子各以其所學行異端遂起至孟子時不得不辯也歲寒然後知松柏之後凋只取堅不變之義鼓萬物而不與聖人同憂聖人有為之功天地不宰之功孔子之時周室雖微天下諸侯尚知尊周為義故春秋之法以尊周為本至孟子時七國争雄而天下不知有周然而生民塗炭諸侯是時能行王道則可以王矣蓋王者天下之義主也故孟子所以勸齊之可以王者此也初見先生次日先生復禮因問安下飯食穩便因謂君子食無求飽居無求安顏子簞瓢陋巷不改其樂簞瓢陋巷何足樂蓋别有所樂以勝之耳伊川問佛戒殺生之説如何曰儒者有兩説一説天生禽獸本為人食此説不是豈有人為蟣蝨而生耶一説禽獸待人而生殺之則不仁此説亦不然大抵力能勝之者皆可食但君子有不忍之心爾故曰見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也舊先兄嘗見一蝎不忍殺放去頌中有二句云殺之則傷仁放之則害義伊川敬以直内義以方外與徳不孤一也為善者以類應有朋自逺方來充之至於塞乎天地皆不孤也伯夷孟子言其迹得聖人之清孔子言淸而有量故曰不念舊惡怨是用希又曰求仁而得仁又何怨若曰餓於首陽之下但不食周粟貧且餓爾非謂不食周粟至於采薇而食之如史遷之説也樂隨風氣至韶則極備若堯之洪水方割四凶未去和有未至也至舜以聖繼聖治之極和之至故韶為備舜巡狩毎五載一方仁在已讓不可也若善名在外則不可不讓管仲不死觀其九合諸侯不以兵車乃知其仁也若無此則貪生惜死雖匹夫匹婦之諒亦無也二程外書卷八
