body:
  text: 二程外書儒家類提要臣等謹案二程外書十二卷亦二程子門人所記而朱子編次之成於乾道癸巳六月在遺書之後五年後序稱遺書二十五篇皆諸門人當時記録之全書足以正俗本紛更之謬而於二先生之語則不能無所遺於是取諸人集録參伍相除得此十二篇以為外書凡採朱光庭陳淵李參馮忠恕羅從彦王蘋時紫芝七家所録又胡安國游酢家本及建陽大全集印本三家又傳聞雜記自王氏麈史至孔文仲疏凡一百五十二條均採附焉其語皆遺書所未録故每卷悉以拾遺標目其稱外書者則朱子自題所謂取之之雜或不能審所自來其視前書學者尤當精擇審取者是也中間傳聞異辭頗不免於叢錯如程氏學拾遺卷内以望道未見為望治道太平一條黄震日抄謂恐於本文有増又時氏本拾遺卷内以老子天地不仁萬物芻狗之說為是一條震亦謂其說殊有可疑盖皆記録既䌓自不免或失其本旨要其生平精語亦多散見於其中故但分别存之而不能盡廢如吕氏童蒙訓記伊川言僧家讀一卷經要一卷經道理受用儒者讀書都無用處一條又明道至禪寺見趨進揖遜之盛嘆曰三代威儀盡在是一條朱子語録嘗謂其記録未精語意不圓而終以其言足以警切學者故並収入傳聞雜記中無所刋削其編録之意亦大畧可見矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書二程外書目錄卷一朱公掞録拾遺朱光庭字公掞從二先生學元祐中為給諫此篇本與師訓入闗等篇相雜疑朱公自記所聞又抄諸人所記以附其後今不可考特拾其遺如此云卷二朱公掞問學拾遺本别為一篇而多與前篇重複今已刪去卷三陳氏本拾遺延平陳淵字幾叟楊文靖公門人卷四程氏學拾遺李參錄參端伯之弟學於伊川先生此書十卷其五卷乃劉質夫春秋解其五卷雜有端伯質夫入闗諸篇卷五馮氏本拾遺汝州馮理字聖先學於伊川先生自號東臯子其子忠恕字貫道學於尹氏編此雜有入闗等篇卷六羅氏本拾遺延平羅從彥字仲素楊文靖公門人卷七胡氏本拾遺胡文定公家本又有别本文其言而每章冠以子曰字者今亦取其不見於諸篇者附於此卷八游氏本拾遺游定夫察院家本卷九春秋錄拾遺呉人王蘋信伯學於伊川先生集錄諸言春秋者為此篇卷十大全集拾遺建陽印本卷十一時氏本拾遺時紫芝所集號程子㣲言凡二十五卷多改易本語者卷十二傳聞雜記王氏麈史發明義理吕氏家塾記酬酢事變范公日記上蔡語錄朱公手帖龜山語錄邵氏見聞錄庭聞藁錄候子雅言震澤語錄涪陵記善晁景迂集和靖語錄晁氏客語吕氏童䝉訓孔文雜志汪端明記仲疏右程氏外書十二篇熹所序次可繕寫始熹序次程氏遺書二十五篇皆諸門人當時記錄之全書足以正俗本紛更之繆而於二先生之語則不能無所遺也於是取諸集錄參伍相除得此十有二篇以為外書夫先生之言非有精粗之異而兩書皆非一手所記其淺深工拙又未可以一槩論其曰外書云者特以取之之雜或不能審其所自來其視前書學者尤當精擇而審取之耳乾道癸巳六月乙亥新安朱熹謹書
