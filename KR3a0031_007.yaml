body:
  text: 二程外書卷七宋朱子編胡氏本拾遺明道曰維天之命於穆不已不其忠乎天地變化草木蕃不其恕乎伊川曰維天之命於穆不已忠也乾道變化各正性命恕也心敬則內自直匹夫悍卒見難而能死者有之矣惟情欲之牽妻孥之愛斷而不惑者鮮矣思慮不得至於苦合天人通義命此大賢以上事人之多聞識却似藥物須要博識是所切用也為天下安可求近效才計較著利害便不是程子與侯仲良語及牛李事因言溫公在朝欲盡去元豐間人程子曰作新人才難變化人才易今諸人之才皆可用且人豈肯甘為小人在君相變化如何耳若宰相用之為君子孰不為君子此等事教他們自做未必不勝如吾曹仲良曰若然則無紹聖間事也尹子親注云此一段可疑世事與我了不相關明道勇一也而用不同有勇於氣者有勇於義者君子勇於義小人勇於氣伊川在經筵已聞上盥潄噴水避蟻他日先生進曰願陛下推此心以及天下程子葬父使周恭叔主客客欲酒恭叔以告先生曰勿陷人於惡風竹便是感應無心如人怒我勿留胸中須如風動竹或謂伊川曰先生於上前委曲已甚不亦過乎曰不於此致力盡心而於何所聖人之責人也常緩便見只欲事正無顯人過惡之意聖人凡一言便全體用聖人責已感也處多責人應也處少有人疑祖殺其父則告之其罪如何律孫告祖當死此不可告明矣然則父殺其子如何律徒一年以理考之當徒二年雖是子亦天子之民也不當殺而專殺之是違制也違制徒二年吾嘗見一貴人吾進退以禮而彼巍巍其自視也惟恐不中節豈不勞哉君子而時中謂即時而中如禹稷當顏子之時不為顏子所為非中也顏子亦然自信則無所疑而不動心公孫丑不知孟子故問不動心有道如數子者皆中有主便心不動性無不善其所以不善者才也受於天之謂性稟於氣之謂才才之善不善由氣之有偏正也乃若其情則無不善矣今夫木之曲直其性也或以為車或可以為輪其才也然而才之不善亦可以變之在養其氣以復其善爾故能持其志養其氣亦可以為善故孟子曰人皆可以為堯舜惟自棄自暴則不可以為善凡聲皆陽聲大鳴則大震小鳴則小震或問維摩詰云火中生蓮花是可謂希有在欲而行禪希有亦如是此豈非儒者事子曰此所以與儒者異也人倫者天理也彼將其妻子當作何等物看望望然以為纍者文王不如是也有生者必有死有始者必有終此所以為常也為釋氏者以成壞為無常是獨不知無常乃所以為常也今夫人生百年者常也一有百年而不死者非所謂常也釋氏推其私智所及而言之至以天地為妄何其陋也張子厚尤所切齒者此耳問張子曰陰陽之精互藏其宅然乎曰此言甚有味由人如何看水離物不得故水有離之象火能入物故火有坎之象作易自天地幽明至於昆蟲草木微物無不合春秋有三傳及三本正經共是六本書子糾事五處皆言糾獨左氏言子糾且糾與小白皆公子非當立而小白長則當立也今糾爭立故皆不言子及殺之然後言子糾蓋謂既已立之矣故須以未踰年君稱之以此校之則管仲之去糾事小白皆非正去就輕也非如建成既為太子而秦王奪之魏徵去建成而事秦王不義之大也學而時習之所以學者將以行之也時習之則所學者在我故説習如禽之習飛孝弟也者其為仁之本與非謂孝弟即是仁之本蓋謂為仁之本當以孝弟猶忠恕之為道也飾過則失實故寧儉喪主於哀戚我不欲人之加諸我也吾亦欲無加諸人恕也近於仁故曰賜也非爾所及也然未至於仁也以其有欲字爾邦無道則能沉晦以免禍故曰不可及也亦有不當愚者比干是也仁之方方術也三月不違仁三月言其久天道小變之節蓋言顏子經天道之變而為仁如此其能久於仁也鮮于侁問伊川曰顏子何以能不改其樂正叔曰顏子所樂者何事侁對曰樂道而已伊川曰使顏子而樂道不為顏子矣侁未達以告鄒浩浩曰夫人所造如是之深吾今日始識伊川面胡文定公集記此事云安國嘗見鄒至完論近世人物因問程明道如何至完曰此人得志使萬物各得其所又問伊川如何曰却不得比明道又問何以不得比曰為有不通處又問侍郎先生言伊川不通處必有言行可證願聞之至完色動徐曰有一二事恐門人或失其傳後來在長沙再論河南二先生學術至完却曰伊川見處極高因問何以言之曰昔鮮于侁曽問顏子在陋巷不改其樂不知所樂者何事伊川却問曰尋常説顏子所樂者何侁曰不過是説顏子所樂者道伊川曰若説有道可樂便不是顏子以此見伊川見處極高又曰浩昔在潁昌有趙均國者自洛中來浩問曽見先生有何語均國曰先生語學者曰除却神祠廟宇人始知為善古人觀象作服便是為善之具又震澤語録云伊川問學者顏子所樂者何事或曰樂道伊川曰若説顏子樂道孤負顏子鄒至完曰吾雖未識伊川面已識伊川心何其所造之深也樂山樂水氣類相合文莫吾猶人也文皆欲勝人至躬行則未嘗得也古之學者必先學詩學詩則誦讀其善惡是非勸戒有以起發其意故曰興人無禮以為規矩則身無所處故曰立此禮之文也中心斯須不和不樂則鄙詐之心入之不和樂則無所自得故曰成此樂之本也古者玉不去身無故不徹琴瑟自成童入學四十而出仕所以教養之者備矣理義以養其心禮樂一作舞蹈以養其血氣故其才髙者為聖賢下者亦為吉士由養之至也所謂利者一而已財利之利與利害之利實無二義以其可利故謂之利聖人於利不能全不較論但不至妨義耳乃若惟利是辨則忘義矣故罕言色斯舉矣知幾莫如聖人翔而後集不止擇君凡事必詳審也兼四人之所長而又文之以禮樂亦可以為成人矣成人之難也武仲之智非正也若文之以禮樂則無不正者今之成人者見利思義見危授命謂忠也久要不忘平生之言信也有忠信而不及禮樂亦可以為成人又其次也伊川先生將屬纊時顧謂端中曰立子蓋指其適子端彥也語絶而沒既除喪明道之長孫昻自以當立侯師聖不可昻曰明道不得入廟耶師聖曰我不敢容私明道先太中而卒繼太中主祭者伊川也今繼伊川非端彥而何議始定或謂師聖曰明道既死其長子不當立乎曰立廟自伊川始又明道長子死已久況古者有諸侯奪宗庶姓奪嫡之説可以義起矣況立廟自伊川始乎尹子親注云此一段差誤學者必知所以入德不知所以入德未見其能進也故孟子曰不明乎善不誠其身易曰知至至之别本拾遺明道見神宗論人材上曰朕未之見也明道曰陛下奈何輕天下士上聳然曰朕不敢朕不敢此段見行狀無上曰朕未之見也一句子曰遊酢得西銘誦之即渙然不逆於心曰此中庸之理也能求於語言之外者也此一條已見於大全集然頗有缺誤故復出此崇慶黨禁方嚴子徙居龍門之南止南方學者曰苟能尊所聞力行所知則可矣不必及門也或問范祖禹曰或謂夫子有言曰人有篤志力行而不知道者信乎祖禹曰吾嘗聞之夫子有所指而言之也時范公在溫公通鑑局中二程外書卷七
