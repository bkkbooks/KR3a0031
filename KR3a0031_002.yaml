body:
  text: 二程外書卷二宋朱子編朱公掞問學拾遺在邦無怨在家無怨在理可使無怨於事亦難天地之大也人猶有所憾伯淳子貢問為仁孔子告以為仁之資非極力言仁也正叔知及之仁不能守之無得也有始有卒先後之序也凡下學人事便是上達天理正叔毋意毋私意也毋必為毋固滯毋彼我乃曽子所言也伯淳人無逺慮必有近憂思慮當在事外正叔忠者天下大公之道恕所以行之也忠言其體天道也恕言其用人道也正叔其言之不怍所為言之不愧伯淳畏天命則可以不失付卑之重畏大人如此尊嚴而亦自可畏畏聖人之言則可以進徳伯淳周至也君子周至而不阿比正叔動容貌舉一身而言也動容周旋中禮斯逺暴慢矣正顏色則不妄斯近信矣出辭氣正由中出斯逺鄙倍矣正身而不外求故曰籩豆之事則有司存伯淳尊五美屏四惡為政在已伯淳聞道知所以為人也夕死可矣是不虚生也伯淳性與天道非自得之則不知故曰不可得而聞伯淳如形而上者謂之道不可移謂字在之字下此孔子文章伯淳𢎞寛廣也毅奮然也𢎞而不毅則無規矩毅而不𢎞則隘陋伯淳君子以矜莊自持不與人爭正叔九思各專其一伯淳何莫由斯道也可離非道伯淳吾斯之未能信不先自信何以治人伯淳里仁為美里人之所止伯淳見賢便思齊有為者亦若是見不賢而内自省葢莫不在已伯淳生理本直罔不直也亦生者幸而免也伯淳知之者在彼而我知之也好之者雖篤而未能有之至於樂之則為己之所有正叔民亦人也務人之義乃知也鬼神不敬則是不知不逺則至於瀆敬而逺之所以為知伯淳先難克巳也伯淳聖乃仁之成徳謂仁為聖譬猶雕木為龍木乃仁也龍乃聖也指木為龍可乎故博施濟衆乃聖之事舉仁而言之則能近取譬是也伯淳能近取譬反身之謂也伯淳以能問於不能以多問於寡有若無實若虚犯而不校顏子當之正叔彼之事是則吾當師之彼之事非是則吾又何校焉是以君子未嘗校也伯淳司馬牛問仁子曰仁者其言也訒司馬牛多言故及此然聖人之言亦止此為是正叔貧不怨則諂諂尤甚於怨葢守不固而有所為也伯淳君子為善只有上達小人為不善只有下達伯淳古之學者為巳為巳在巳也伯淳不怨天不尤人在理當如此伯淳樂取於人為善便是與人為善與人為善乃公也正叔知性善以忠信為本此先立其大者伯淳公孫丑問孟子加齊之卿相恐有所不勝而動心北宫黝之勇氣亦不知守也孟施舍之勇知守氣而不知守約也曽子之所謂勇乃守約守約乃義也與孟子之勇同伯淳告子不得於言勿求於心葢不知義在内也志帥氣也持定其志無暴亂其氣兩事也志専一則動氣氣専一則動志然志動氣為多且若志専在淫辟豈不動氣氣専在喜怒豈不動志故蹶者趨者反動其心志者心之所之也伯淳自曽子守義皆説篤實自内正本之學則觀人可以知言蔽陷遁窮皆離本也宰我子貢善為説辭冉牛閔子顏淵善言徳行孔子兼之葢有徳者必有言而曰我於辭命不能者不尚言也易所謂尚口乃窮也伯淳宰我子貢有若其智足以知聖人汙曲亦不至阿其所好以孔子之道彌綸天壤固賢於堯舜而觀生民以來有如夫子者乎然而未為盡論但不至阿其所好也伯淳所存者神在已也所過者化及物也伯淳驩虞有所造為而然豈能久也耕田鑿井帝力何有於我哉如天之自然乃王者之政伯淳色形所有也聖人人倫之至故可以踐形伯淳盎於背厚也正叔此亦妄人也是以義斷在聖人如天地涵容但哀矜而已子厚自反而忠而橫逆者猶若是君子曰又何難焉此一事已處了若聖人哀矜又别一事正叔不下帶言近也正叔不祥凶也君子好成物故吉小人好敗物故凶正叔日月之明但容光者無不照正叔保民如赤子此所以為大人謂不失嬰兒之心不若保民如赤子為大湯武反之也湯武身之也身踐履也反復也復則至聖人之地伯淳羞惡則有所不為知所止乃義之端伯淳舜明於庶物察於人倫然後由仁義行正叔仁推之及人若老吾老以及人之老於民則可於物則不可統而言之則皆仁分而言之則有序正叔坤六二文言云云坤道也誠為統體敬為用敬則内自直誠合内外之道則萬物流形故義以方外聖人齋戒敬也以神明其徳惡人齋戒亦敬也故可以事上帝先見則吉可知不見故致凶伯淳幽贊於神明而生蓍用蓍以求卦非謂有蓍而後畫卦伯淳祗與底同使底至也無至於悔伯淳㢲以行權義理所順處所以行權伯淳安安安於理之所安者伯淳聖人無過湯武反之也其始未必無過所謂如日月之食乃君子之過人心人欲道心天理正叔大學之道在明其明徳明徳乃止於至善也知既至自然意誠顏子有不善未嘗不知知之至也知之至故未嘗復行他人復行知之不至也正叔致知在格物格至也物事也事皆有理至其理乃格物也然致知在所養養知莫過於寡欲二字正叔君子所不可及者其惟人之所不見乎詩曰相在爾室尚不愧於屋漏君子慎獨伯淳敬則自然儼若思安定辭其徳可以安民伯淳有餘便是過慥篤實貌正其理則萬事一一以貫之也正叔君子而時中無時不中伯淳荀子曰養心莫善於誠周茂叔謂荀子元不識誠伯淳曰既誠矣心焉用養邪荀子不知誠二程外書卷二
