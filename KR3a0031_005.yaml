body:
  text: 二程外書卷五宋朱子編馮氏本拾遺春秋書災異蓋非偶然不云霜隕而云隕霜不云夷伯之廟震而云震夷伯之廟分明是有意於人也天人之理自有相合人事勝則天不為災人事不勝則天為災人事常隨天理天變非應人事如祈寒暑雨天之常理然人氣壯則不為疾氣羸弱則必有疾非天固欲為害人事德不勝也如漢儒之學皆牽合附會不可信自孔子贊易之後更無人㑹讀易先儒不見於書者有則不可知見於書者皆未盡如王輔嗣韓康伯只以莊老解之是何道理某於易傳殺曾下工夫如學者見問儘有可商量書則未欲出之也今時人看易皆不識得易是何物只就上穿鑿若念得不熟與就上添一德亦不覺多就上減一德亦不覺少譬如不識此兀子若減一隻腳亦不知是少添一隻腳亦不知是多若識則自添減不得也庶母亦當為主但不可入廟子當祀於私室主之制度則一蓋有法象不可增損增損則不成矣祭如在言祭自己祖先祭神如神在言其他所祭者如天地山川皆是也非其鬼言已不當祭者既知其非然且為之是無勇也無勇雖因上文然不止於此一事論語孟子只剩讀著便自意足學者須是玩味若以語言解著意便不足某始作此二書文字既而思之又似剩只有些先儒錯會處却待與整理過某嘗謂世間有三事工夫一般國家之祈天永命道家之長生久視儒者之入於聖人理道皆一釋氏之學正似用管窺天一直便見道他不是不得只是却不見全體不信神怪事亦不得便放猛須是知道理若是直放猛不知道理撞出來後如何處置月令儘是一部好書未易破他栁子厚破得他不是若春行賞秋行刑只是舉大綱如此如云湯執中文王視民如傷武王不泄邇不忘逺不成聖人各只有一事可稱也且據一處言之耳又如冬日則飲湯夏日則飲水不成冬日不得飲水夏日不得飲湯也四時改火不得不然蓋水之為患常少火之為患常多龍見而雩可見寒食禁火只是將出新火必盡熄天下之火然後出之也世間風俗蓋訛謬之甚耳四時取火用木各異必据時之所宜不必盡考也儒者只合言人事不合言有數直到不得已處然後歸之於命可也顏子有不善未嘗不知知之未嘗復行如顏子地位豈有不善所謂不善者只是微有差失才差失便能知之知之便更不萌作顏子大率與聖人皆同只這便有分别若無則便是聖人曾子三省只是緊約束顏子便能三月之久到這些地位工夫尤難直是峻絶又大段著力不得合葬須以元妃配享須以宗子之嫡母此不易之道二程外書卷五
