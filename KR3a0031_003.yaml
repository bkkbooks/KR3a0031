body:
  text: 二程外書卷三宋朱子編陳氏本拾遺朝聞道夕死可矣死得是也三月不違仁言其久過此則從心不踰矩聖人也聖人則渾然無間斷故不言三月此孔子所以惜其未止也聖人天地之用也養心莫善於寡欲多欲皆自外來公欲亦寡矣興於詩者吟咏性情涵暢道徳之中而歆動之有吾與㸃之氣象老者安之朋友信之少者懷之乃天道也由孟子可以觀易復其見天地之心一言以蔽之天地以生物為心聖人無一事不順天時故至日閉闗人之一肢病不知痛癢謂之不仁人之不仁亦猶是也蓋不知仁道之在巳也知仁道之在巳而由之乃仁也克者勝也難勝莫如巳勝巳之私則能有諸巳是反身而誠者也凡言仁者能有諸巳也一作凡言克者未能有諸巳也必誠之在已然後為克巳禮亦理也有諸已則無不中於理君子慎獨敬以直内義以方外所以為克己復禮也克己復禮則事事皆仁故曰天下歸仁人之視最先非禮而視則所謂開目便錯了次聴次言次動有先後之序人能克己一作克仁則心廣體胖仰不愧俯不怍其樂可知有息則餒矣一言可以興邦公也一言可以喪邦私也公主明極高明而道中庸非二事中庸天理也天理固高明不極乎高明不足以道中庸中庸乃高明之極伯淳君子有義有命求則得之舍則失之是求有益於得也求在我者也此言義也求之有道得之有命是求無益於得也求在外者也此言命也至於聖人則惟有義而無命行一不義殺一不辜而得天下不為也此言義不言命也人心惟危人欲也道心惟㣲天理也為惡之人未嘗知有思有思則為善矣思至於再則已審三則惑矣艮其背止欲於無見若欲見於彼而止之所施各異若艮其止止其所也止各當其所也聖人所以應萬變而不窮一作勞者事各止當其所也若鑑在此而物之妍媸自見於彼也聖人不與焉時止則止時行則行時行對時止而言亦止其所也艮思不出其位乃止其所也動靜不失其時皆止其所也艮其背乃止也背無欲無私也故可止加我數年五十以學易時年未五十也孔子未發明易道之時如八索之類不能無謬亂既贊易道黜八索則易之道可以無過謬言學與大皆謙也子貢善形容孔子徳美温以接物良乃善心恭則不侮儉則無欲讓則不好勝至於是邦宜必聞政孔子生而知之者也自十五以下事皆學而知之者所以教人也三十有所立四十能不惑五十知天命而未至命六十聞一以知百耳順心通也凡人聞一言則滯於一言一事則滯於一事不能貫通耳順者聞言則喻無所不通七十從心然後至於命願無伐善則不私矣無施勞則仁矣顏子之志則可謂大而無以加矣然以孔子之言觀之則顔子之言出於有心也至於老者安之朋友信之少者懷之猶天地之化付與萬物而已不勞焉此聖人之所為也今夫羈靮以御馬而不以制牛人皆知羈靮之制在乎人而不知羈靮之生由於馬聖人之化亦由是也孔子之見南子禮當見之也南子之欲見孔子亦其善心也聖人豈得而拒之子路不悦故夫子陳之曰予所否塞者天厭之言使我至此者天命也孔子曰二三子以吾為隱乎吾無隱乎爾無知之謂也聖人之教人俯就之若此猶恐衆人以為高逺而不親也聖人之言必降而自卑不如此則人不親賢人之言必引而自高不如此則道不尊觀孔子孟子則可見矣叩其兩端者如樊遲問仁子曰愛人問知子曰知人舉其近者衆人之所知極其逺者雖聖人亦如是矣其與人莫不皆然終始兩端皆竭盡矣聖人愈自卑而道已高賢人不高則道不尊聖賢之分也不為酒困是也子路冉有公西華皆欲得國而治之故孔子不取曾㸃狂者也未必能為聖人之事而能知孔子之志故曰浴乎沂風乎舞雩詠而歸言樂而得其所也孔子之志在於老者安之朋友信之少者懷之使萬物莫不遂其性曾㸃知之故孔子喟然歎曰吾與㸃也仲尼三年有成因周之舊喜怒在事則理之當喜怒也不在血氣則不遷於義理無害雖貧亦樂有害則慊慊一有則字不樂桀溺言天下衰亂無道者滔滔者皆是也孔子雖欲行其教而誰可以化而易之孔子言如使天下有道我則無所治不與易之也今所以周流四方為時無道故也聖人不敢有忘天下之心知其不可而猶為之故其言如此二帝三王之道後世無以加焉孔子之所常言故弟子聚而記之夫子得邦家亦猶是也堯曰篇語之而敬故不惰言其好學也瞻之在前過者忽然在後不及也如有所立卓爾聖人之中也子在囘何敢死死當為先死非囘之所當為所當為者上告天子下告方伯以討其罪爾舉前代之善者準此以損益之此成法也鄭聲使人淫溺佞人使人危殆故逺之然後可守成法不踰閑者不踰矩也小徳出入於法度之中大徳如孔子小徳如顏子有一不善是亦出入也聖人之教未嘗私厚其子學詩學禮止可告之若此學必待其自肯孔子與惡人言故以遜辭免禍言不必信行不必果惟義所在此之謂也然而孔子未嘗不欲仕但仕於陽虎之時則不可吾將仕矣未為非信也公山召我而豈徒哉是孔子意他雖叛而召我其心不徒然往而教之遷善使不叛則已此則於義直有可往之理而孔子亦有實知其不能改而不往者佛肸召亦然禘自既灌而往皆不足觀從首至末皆非也知孔子不欲觀之説則於天下知萬事各正其名則其治如示諸掌獲罪於天時無所祈禱何為媚奥何為媚竈奥尊者所居喻貴臣竈一家所切喻當權孔門弟子自孔子沒後各自離散只有曽子便别如子夏子張欲以所事孔子事有若獨曽子便道不可自子貢以上必皆不肯某自涪陵歸見門人皆已支離不知他日身後又何如也但得箇信時便自有長進處孔子弟子甚多亦不能皆合於孔子如子路言子之迂也又曰末之也已及其退思終合於孔子只為他信便自然思量到也此一叚莆田本皆不及門今不在焉徳不孤必有鄰一徳立而百善從之棠棣之華偏其反而豈不爾思室是逺而只取不逺之意山梁雌雉時哉時哉此聖人嘆雉在山梁得其時而民不得其時也子路不察乃共之三嗅而作使子路知我意不在是也毋意毋非禁止之辭聖人絶此四者何用禁止毋意與毋我相近毋固與毋必相近須要分别不同意與志别志是所存處意是發動處如先意承志自别也意發而當即是理也非意也發而不當是私意也又問聖人莫是任理而不任意否曰是二程外書卷三
