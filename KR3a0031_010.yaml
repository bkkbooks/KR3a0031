  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0031_WYG_010-1a, image: WYG0698/WYG0698-0322a.png}
body:
  text: 二程外書卷十宋朱子編大全集拾遺聖人未嘗無喜也象喜亦喜聖人未嘗無怒也一怒而安天下之民聖人未嘗無哀也哀此煢獨聖人未嘗無懼也臨事而懼聖人未嘗無愛也仁民而愛物聖人未嘗無欲也我欲仁斯仁至矣但中其節則謂之和荀卿才高學陋以禮為僞以性為惡不見聖賢雖曰尊子弓然而時相去甚逺聖人之道至卿不傳揚子雲仕莽賊謂之旁燭無疆可乎隱可也仕不可也劉子文之學甚支離只立名做法語便不是了游酢於西銘讀之已能不逆於心言語之外别立得這箇義理便道中庸矣道一作到向日與向火意思别火只是一箇酷烈底性日則自然一般生底氣便與人氣接問星辰曰星是二十八宿辰是日月五星井泉之異全由地脈一澑之别伯淳在扶溝扶溝水皆醎惟僧舍井小甘不欲令婦女往汲之乃禁之既禁之又一縣無水乃相一端鑿一井其味適别地脈是一澑也又如在襄城寺中水醎寺外水甘一日觀其墻下有地皮一旋裂於是試令近墻鑿井遂亦甘只是要相地脈如何冬桃今視之似先春其實晚桃也直到如今方發南京三十六岡改葬只是臺中人為之要得自振其術以營利也有人葬埋至有毁伐其親之尸以祈福利然偶獲禍其事雖未必然然据理安得不招此禍冬至與諸友賀先生不出云有司法服慰乃出子夏易雖非卜商作必非杜子夏所能為必得於師傳也易因爻象論變化因變化論神因神論人因人論德行大體通論易道而終於默而成之不言而信存乎德行復者反本也本有而去之今來復乃見天地之心也乃天理也此賢人之事也惟聖罔念作狂如周官六德之聖通明之謂也徽柔懿恭四事也徽懿皆美也懿美中似有寬裕意研其意味乃得之若淵亦深也淵則深中有奧意周禮不全是周公之禮法亦有後世隨時添入者亦有漢儒撰入者如吕刑文侯之命通謂之周書學者有所得不必在談經論道間當於行事動容周旋中禮得之學者不學聖人則已欲學之須是熟玩聖人氣象不可止於名上理㑹如是只是講論文字易學後來曽子子夏學得㬠到上面也君實近年病漸較㬠放得下也致知在格物格至也窮理而至於物則物理盡先生曰司馬遷為近古書中多有前人格言如作紀本尚書但其間有曉不得書意有錯用却處嘉仲問項籍作紀如何曰紀只是有天下方可作又問班固嘗議遷之失如何曰後人議前人固甚易天下寧無魏公之忠亮而不可無忠臣之義昔事建成而今事太宗可乎薛公言黥布出上策則關東非漢有非也使出上策亦敗趙襄子姊為代國夫人襄子既殺代王將奪其國夫人距戰是也身為代國夫人社稷無主獨當其任義不可棄社稷以與弟則戰而殺之非姊殺弟也代國夫人殺賊也陳實見張讓是故舊見之可也不然則非矣此所謂太丘道廣唐之有天下數百年自是無綱紀太宗肅宗皆篡也更有甚君臣父子其妻則取之不正又妻殺其夫篡其位無不至也若太宗言以功取天下此尤不可最啓僭奪之端其惡大是殺兄篡位又取元吉之妻後世以為聖明之主不可㑹也太宗與建成史所書却是也肅宗則分明是乘危而篡若是則今後父有事安得使其子新書且未說義中否且如與小人說能亦有至言然只是一箇氣象今日新書讀之便有一箇支離氣象疑有誤字觀太學諸生數千人今日之學要之亦無有自信者如游酢楊時等二三人游其間諸人遂為之警動敬而逺之先生自少時未嘗乘轎頃在蜀與二使者游二峽使者相强乘轎不可詰其故語之曰某不忍乘分明以人代畜若疾病及泥濘則不得已也二使者亦將不乘某語之曰使者安可不乘既至留題壁間先生曰毋書某名詰其故曰以使者與一閒人遊若錚客當時竟不乘轎亦不留名村酒肆要之蠧米麥聚閒人妨農工致詞訟藏賊盜州縣極有害正叔謂子厚在禮院所定龍女衣冠使依封號夫人品秩為準正叔語其非此事合理㑹夫大河之塞莫非上天降鑒之靈官吏勤職士卒效命彼龍水獸也何力焉今最宜與他正人畜分不宜使畜産而用人之衣服汝之多癭以地氣壅滯嘗有人以器雜貯州中諸處水例皆重濁至有水腳如膠者食之安得無癭治之之術於中開鑿數道溝渠泄地之氣然後少可也介甫言律是八分書是他見得又有學律者言今之人析言破律正叔謂律便是此律否但恐非也學者以傳世來未之或能改也惟近年改了一字舊言指斥乘輿言理惡者死今改曰情理亦非也今有人極一場凶惡無禮於上猶不當死須是反逆得死也邪酒是麴糵為之以亂其氣人苟持其志則不到於亂乃知飲酒須德持之未有害也志之為力極可怪石炭穴中遺火則連蔓火不絶故有數百千年今火山蓋為山中時有火光必是此箇火時發於山間也昔聶覺唱不信鬼神之說故身殺湫魚其同行者有不食魚而病死者有食魚亦不病不死者只是其心打得過或食而病或不食而病要之山中陰森之氣心懷憂思以致動其氣血也如太一湫魚自唐以來自不敢取今當不可容然亦只如此者蓋自相食及亦有死傷也若晉祠之魚則極多必是吞魚之魚不衆也伯淳嘗到其水濱魚可俯拾然衆人不取以神為畏而特不殘及於此魚也今人家買乳婢亦多有不得已者或不能自乳須著使人然食巳子而殺人之子不是道理必不得已用二乳而食二子我之子又足備他虞或乳母病且死則不能為害或以勢要二人又不更為巳子而殺人子要之只是有所費若不幸致誤其子害孰大焉今人居覆載中却不知天地在照臨之內却不理會得日月此冥然而行者也凡人有斗筲之量有鍾鼎之量有釜斛之量江海亦大矣然尚有限惟聖人之量與天地並故至多不盈至少不虛凡人為器量所拘到滿後自然形見本朝向敏中號有度量至作相却與張齊賢爭取一妻為其有十萬囊槖故也王隨亦有德行仁宗嘗稱王隨德行李淑文章至作相蕭端公欲得作三路運使及退隨語室中人曰何不以溺自照面看做得三路運使無皆量所動也今人何嘗不動只得綾寫一卷與便動又干他身分甚事程蘇之姓傳於天下者不蕃至於張王李趙雖其出不一要之其姓蕃衍此亦受姓之祖其流之盛固有定分也日再中只是新垣平詐言也史冊實之後世遂以為誠然如丁謂天書之類當時人却未必全信却是後世觀史者已信矣太行山千里一塊石更無間故於石上起峰天下獨高處無如河東上黨者言上與天為黨也澤州北望有桑林村蓋湯自為犧牲處湯十一遷所居皆言亳却似今言京師之比佛畢竟不知性命世之人相詆曰爾安知性命是果報知之問古人所謂衣冠不正無容止為身之恥今學佛者反以為幻妄此誠為理否曰只如一株樹春華秋枯乃是常理若是常華則無此理却是妄也今佛氏以死為無常有死則有常無死却是無常周茂叔謂一部法華經只消一箇艮卦可了要之釋氏之學他只是一箇自私姦黠閉睂合眼林間石上自適而已明言吾理使學者曉然審其是非始得釋氏之說其歸欺詐今在法欺詐雖赦不原為其罪重也及至釋氏自古至今欺詐天下人莫不溺其說而不自覺也豈不謂之大惑耶原釋祖只是一箇黠胡亦能窺測因緣轉化其始亦只似譬喻其徒識卑者得入於形器故後來只去就上結果其說始以世界為幻妄而謂有天宫後亦以天為幻卒歸之無佛有髮而僧復毁形佛有妻子舍之而僧絶其類若使人盡為此則老者何養幼者何長以至剪帛為衲夜食欲省舉事皆反常不近人情至如夜食後睡要敗陽氣其意尤不美直如此奈何不下大宗小宗圖子六七年前被人將出後來京師印却便是這本二程外書卷十
