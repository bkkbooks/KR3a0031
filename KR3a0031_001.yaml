  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0031_WYG_001-1a, image: WYG0698/WYG0698-0284c.png}
body:
  text: 二程外書卷一宋朱子編朱公掞錄拾遺性靜者可以為學淳學在知其所有又養其所有淳實是實非能辨則循實是天下之事歸於一是是乃理也循此理乃可進學至形而上者也正學如不及猶恐失之不得放過也正忠信為基本所以進徳也辭修誠意立所以居業也此乃乾道由此二句可至聖人也淳得意則可以忘言然無言又不見其意正心得之然後可以為已物淳君子敬以直内義以方外為學本黙而識之吾不得而見之矣得見善問者斯可矣治其器必求其用學道者當如何爾學始於不欺闇室學者多蔽於解釋注疏不須用功深大率把捉不定皆是不仁去不仁則仁存仁載此四事由行而宜之謂義履此之謂禮知此之謂智誠此之謂信神也者妙萬物而為言若上竿㺯瓶至於斲輪誠至則不可得而知上竿初習數尺而後至於百尺習化其髙矧聖人誠至之事豈可得而知淳人必以忠信為本無友不如巳者無忠信者也子以四教文行忠信忠信禮之本人無忠信則不可以為學士大夫必建家廟廟必東向其位取地潔不喧處設席坐位皆如事生以太祖面東左昭右穆而已男女異位葢舅婦生無共坐也姑婦之位亦同太祖之設其主皆刻木牌取生前行第或銜位而已婦各從夫每月告朔茶酒四時春以寒食夏以端午秋以重陽冬以長至此時祭也每祭訖則藏主於北壁夾室拜墳則十月一日拜之感霜露也寒食則又從常禮祭之飲食則稱家有無祭器坐席皆不可雜用廟門非祭則嚴扃之童孩奴妾皆不可使䙝而近也仁者在巳何憂之有凡不在巳逐物在外皆憂也樂天知命故不憂此之謂也若顏子簞瓢在他人則憂而顏子獨樂者仁而已作詩者未必皆聖賢當時所取者取其意思止於禮義而已其言未必盡善如比君以碩鼠狡童之類詩有取其意思可取者如無衣之詩亦有時而迫切取興有一事含數件事者如瞻彼日月悠悠我思詖辭偏蔽淫辭陷溺深邪辭信其説至於耽惑遁辭生於不正窮著便遁如墨者夷之之辭此四者楊墨兼有不以文害辭文文字之文舉一字則是文成句是辭詩為解一字不行却遷就他説如有周不顯自是作文當如此子見南子子路不説以孔子本自見衛君行道反以非禮見迫孔子歎予所否者天厭之天喪予之意否否泰之否天厭吾道也性與天道此子貢初時未達此後能達之故發此歎辭非謂孔子不言其意淵奥如此人豈易到曰山梁雌雉時哉時哉色斯舉矣翔而後集子路聞之竦然共立後三嗅而作文如此順恐後人編簡脱錯嗅字又不知古作甚字又近唄字薄賣反日知其所亡月無忘其所能今人不為也信之不篤執徳無由𢎞立則見其參於前也在輿則見其倚於衡也然後可以祈益無衣若以王道出軍行師我則修我戈矛與子同仇七月豳風大意憂思深逺有終久底意不惟豳國當如此又成王中變自然發起周公言終久意思一之日二之日語辭如此今人尚道甚時如何又如何不可謂變月言日女心傷悲采蘩女功之時悲則思慮意當女功事思慮一家之所須君子之奉殆及君子同享此不須執辭此是終久底意思鴟鴞惡鳥謂之既取我子無毁我室言惜巢之甚在鳥如此在人則是不壞王室不必以子為管蔡鴟鴞是管蔡此一篇闕文難解出車喓喓草蟲意是南征西夷怨薄伐西戎時如此采薇彼爾戍役戍役維何維常之華言與將帥相承副如常棣之華路路車也君子將帥也君子所依小人所腓喻君子之憑依士衆小人則腓也易咸其腓腓脚肚動貌作止柔止喻時皇華送之以禮樂君不能自行故遣使以諭誠意於四方若無忠信安得誠意言此詩是如此不必詩中求九罭遵渚不宜刺朝廷言公之不歸於女信安乎得無以我公歸乎詩若還以樂天知命處之則一時都無事其中也有君子情意不到處詩可以怨譏刺總是小弁與舜之怨别舜是自怨小弁直怨我罪伊何大要則止乎禮義其情則是國人之情考槃觀其名早已可見君子之心處之已安知天下決然不可復為雖然如此退處至於其心寤寐間永思念不得復告於君畎畝不忘君之意候人言不稱其君臣相遇薈兮蔚兮草木藂茂貌山有薈蔚之草木便朝躋而采之室有婉孌之少女人便斯飢而思之薈蔚言其材斯飢言其徳白華自是漚之為菅白茅自是為束各自為用如后妾各自有職分之子却逺此義理雲結為雨露所以均被菅茅王之遇妃妾貴賤亦當均被我天運艱難故之子不猶碩人幽王也樵彼桑薪薪之善者也申后宜待之以禮今反薄鼓聲聞於外我之誠意反不能感動於君此有鶖得所之不若也鴛鴦戢翼其常如此扁石登髙以升車今捨此履卑如舍申適褒丘中有麻大都言丘言阿言山多喻朝廷丘中是物所生聚處麻是亦生其間不謂丘中更豐美但言丘中有麻麻能衣人有用底物喻賢者有益於人言朝廷當有賢者今彼畱乃小人賢者却咨嗟不見用將其來施施思其來當有賢者以施惠澤也麥人所賴以食亦喻賢者却反在鄉國故思其來食李徒能悦人口而不足以濟人如小人在位徒能悦人而無實效及於民又貽我佩玖止以其玩好而不切於用賢者則如麻麥之衣食人丘中有麻不是所宜有處一本無不字碩人頎頎碩人敖敖疑頎頎敖敖兩句先言莊公衣褧衣非婦人服說於農郊言其勤政已下始言莊姜翟茀以朝勸勉莊公使大夫夙退無使君勞不說使驕上僭却言其勤政見莊姜賢處含怒不妬爭意施罛濊濊鱣鮪發發言罛非取魚之意不能得大魚興莊姜不見答徒有葭菼揭揭似庶姜孽孽驕且上僭故庶士有朅言國人閔而憂之也罛小器也鱣鮪大魚也葭菼冗雜貌罛中又隱無子意自牧歸荑卑以自牧之意荑柔順意自牧歸順信美且異此非是女能如此美乃賢美人貽之如此深美之所以切責之序言衛君無道夫人無徳式㣲式㣲㣲衛君之故故字以其職而言以其為方伯連帥故暴露於中野㣲衛君之躬指其人也又切指其人者以仁人君子望之泥中泥塗之中也大率詩意貴優柔不迫切此乃治詩之法以為君若不在此我胡為在此斥黎君也乃是脅君以歸又迫切時幾乎罵旄丘地名前高後下誕之節兮言葛節短也延蔓相屬叔伯何故却不相救恤何字之一作文意黎在衛之西狄在衛之北我黎之臣子非無車但汝不與我同故也中谷有蓷蓷菼葦當在水不當在谷中是失所意修字非修長之修疑同周禮修脯之修過於乾底意暵暴也其乾猶未甚但遇爾艱難我便不善去濕則其性之濕都無言其恩意已絶啜其泣矣何嗟及矣嗟時也三英粲兮粲然光明貌英乃若五紽類自是衣服禮數制度非三徳也芄蘭蔓生草柔弱不能自立須依附方成枝葉興惠公柔弱童子佩成人之服雖佩人君成人之服其才能却不我知垂帶悸兮臨朝悸悸然執心不定甲長也才能却不能君長我庶民兔爰兔奔走意詩序閔周由桓王失信故諸侯背叛構怨連禍而使王師傷敗却周人受其禍難羅本以罝兔今却雉離于羅如諸侯不軌周人受害雄雉于飛泄泄其羽雙飛之意此男怨之辭言雄雉尚得其配匹已反不如我之懷思自罹此阻隔次章女怨下上其音相應和之辭日月取其迭往迭來之意又日月陰陽相配而不相見又旦暮所見動人情思總意包其間百爾君子責為政者汝豈不知徳行戰國間惟是報怨不然貪人土地未嘗有以義興師動衆言汝但不忮不求何所用而不臧忮報怨也求貪土地也若以義發師婦人何怨之有婦人猶勉之正也若謂夫從役婦便怨成何義理狡童褰裳此兩節都只一意别無異義然謂君為狡童於義有害離騷之中憂君之心則至然謂之不合道者後面比君為禽又况目之曰狡童言不與我即是鄭國人臣罪當誅天王聖明文王之心以紂為聖明何況比君為禽又況目之狡童但作詩者未必皆聖人孔子各有所取此則取其不能與賢人圖事清人一篇却是詠歌其事含情意在其間消彭軸莫也是地名左旋右抽中軍作好不必言射猶言高克之進不以禮摽有梅汲汲惟恐不及時有女同車前説忽不娶齊女後言齊女却失却本意忽不娶齊謂齊大非偶却不因色此則是設辭下言彼美結他詩中似如此者亦多丰以諸事豐備此詩主意言男則須言女是俟我於巷非不下我又俟我於堂非不有禮將迎不可訓作送但女家因事不得將迎也衣錦裳錦即是丈夫若婦人則惟欲其顯安有惡其文之著古之錦疑今之綾是褧錦相副之物如男女相配叔兮伯兮故駕予與行都主男女怨思失期意東門之揚言婚姻昏時今則明星煌煌而不至揚最得陽氣之先者言人反不及時凡説婚姻男女多言東東取生育之意人君多言南凶喪多言北又有各就其國所有而言者如周詩多言南羔裘豹祛不是相稱猶君臣民須一體今反不相䘏民則惟惠之懷言豈無他人惟子之故汾沮洳沮洳水浸下濕之地雖有生物衆人亦棄之不采而君去采之言其儉嗇太過衆人棄之如此彼其之子反美愛之無度公路公行非公道如此非衆人所共取即非公道公族公類公路衆人所共由之路伐檀檀材可適用者言君子雖不得進亦自致身於清潔之地檀美材須是作梁棟用至於輪輻非檀可為東門之墠除地曰墠茹藘可以染色言以禮則坦平如墠以色則姦阻如阪所以致民如此者正謂其室家則邇其人甚逺大抵丰東門之揚盡是已許昏後以禮不足不能成昏至於過時後上又不能使人殺禮故使人至淫奔婦人脯脩棗栗若以禮時則是踐履此室家之道豈不思欲得以禮如此即子不我即故待禮不得也葛屨儉嗇便機巧計較所得也糾糾牢固意言牢做葛屨亦以履霜摻摻貴者言衣服亦分貴賤禮諸母不潄裳䙅之襋之補綻意提提據字義勞意宛然左辟右插衣古者短右袂謂便於事此皆賤者之事却佩象揥貴者之服此等總生於褊心無衣武公始并晉國而能請命於天子之使故美其可美也當時使來到國故請之七與六衣中一箇數目無以六為節此惟美其能請命一事以簒國殺君不以為羞至於衣服僭侈何難然其心不安至於請命然後安此意思却可取又聖人不獨取其如此亦以見當時之善雖大惡有如此詩亦可取魯風詩非無大惡然聖人錄其頌不錄其風此則為君諱也觀其頌之善止於此其他則可知揚之水白石鑿鑿同介甫説素衣朱襮見其美於外如桓叔在下反見其徳澤於民使晉人從之采苓苓是甘草喻讒最好若首陽之上却無二程外書卷一
